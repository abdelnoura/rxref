<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxRef — Clinical Reference Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--sur:#FFFFFF;--sur2:#F0EDE6;--bdr:#E2DDD4;--bdr2:#D4CFC4;
  --tx:#1A1614;--txm:#6B6560;--txs:#9E9892;
  --acc:#1C3A5E;--acc-l:#EBF0F7;--acc-m:#5B8DB8;
  --delta:#7C3A00;--delta-l:#FFF4EB;--delta-b:#E8825A;
  --sup:#0A4A2A;--sup-l:#EBF7F0;--sup-b:#2A9D6A;
  --conf:#5A0A0A;--conf-l:#FFF0F0;--conf-b:#D94040;
  --nuance:#3A3A0A;--nuance-l:#FAFAEB;--nuance-b:#C4B800;
  --warn:#5A3A00;--warn-l:#FFF8EB;--warn-b:#D4860A;
  --fn:'Syne',sans-serif;--serif:'Instrument Serif',serif;--mono:'IBM Plex Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;line-height:1.5}
a{color:var(--acc);text-decoration:none}

/* LAYOUT */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.logo-mark{width:22px;height:22px;background:var(--acc);border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:12px;height:12px;fill:#fff}
.breadcrumb{font-size:12px;color:var(--txm);display:flex;align-items:center;gap:6px}
.breadcrumb span{color:var(--txs)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{padding:5px 12px;border:1px solid var(--bdr);border-radius:5px;background:var(--sur);color:var(--txm);font-size:12px;font-family:var(--fn);cursor:pointer;font-weight:500}
.tb-btn:hover{border-color:var(--bdr2);color:var(--tx)}
.tb-btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.tb-btn.primary:hover{opacity:.88}
.main-row{display:flex;flex:1;overflow:hidden}

/* LEFT NAV */
.lnav{width:220px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.lnav::-webkit-scrollbar{width:3px}
.lnav::-webkit-scrollbar-thumb{background:var(--bdr)}
.lnav-section{padding:14px 14px 6px;border-bottom:1px solid var(--bdr)}
.lnav-label{font-size:10px;font-weight:600;color:var(--txs);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;color:var(--txm);margin-bottom:1px}
.nav-item:hover{background:var(--sur2);color:var(--tx)}
.nav-item.active{background:var(--acc-l);color:var(--acc)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--bdr2);flex-shrink:0}
.nav-item.active .nav-dot{background:var(--acc)}
.delta-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--delta-l);color:var(--delta);border:1px solid var(--delta-b);margin-left:auto}

/* PATIENT PANEL */
.pt-panel{padding:12px 14px}
.pt-empty{font-size:12px;color:var(--txs);line-height:1.5;margin-bottom:8px}
.pt-add{width:100%;padding:7px;background:var(--acc);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fn)}
.pt-filled{font-size:11px}
.pt-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--sur2)}
.pt-row:last-child{border-bottom:none}
.pt-lbl{color:var(--txs)}
.pt-val{font-weight:500;color:var(--tx);font-family:var(--mono);font-size:11px}
.pt-edit{font-size:11px;color:var(--acc);cursor:pointer;margin-top:6px;display:inline-block}
.pt-match-card{margin-top:10px;padding:8px;background:var(--acc-l);border-radius:5px;border:1px solid #C5D5E8}
.pt-match-title{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.pt-match-item{font-size:11px;color:var(--acc);padding:2px 0;display:flex;align-items:flex-start;gap:5px}
.pt-match-item::before{content:'→';flex-shrink:0;margin-top:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* DISEASE HEADER */
.d-header{margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--tx)}
.d-title{font-family:var(--serif);font-size:30px;color:var(--tx);letter-spacing:-.5px;margin-bottom:4px}
.d-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:8px}
.d-meta-item{font-size:11px;color:var(--txm);display:flex;align-items:center;gap:4px}
.d-meta-dot{width:4px;height:4px;background:var(--bdr2);border-radius:50%}
.status-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.status-reviewed{background:var(--sup-l);color:var(--sup);border:1px solid var(--sup-b)}
.status-update{background:var(--delta-l);color:var(--delta);border:1px solid var(--delta-b)}

/* QUICK SUMMARY */
.qs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.qs-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:12px}
.qs-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--txs);margin-bottom:7px}
.qs-item{font-size:12px;color:var(--tx);padding:3px 0;border-bottom:1px solid var(--sur2);line-height:1.4;display:flex;gap:6px}
.qs-item:last-child{border-bottom:none}
.qs-item::before{content:'·';color:var(--txs);flex-shrink:0}
.qs-card.accent{background:var(--acc);border-color:var(--acc)}
.qs-card.accent .qs-title{color:rgba(255,255,255,.7)}
.qs-card.accent .qs-item{color:#fff;border-bottom-color:rgba(255,255,255,.15)}
.qs-card.accent .qs-item::before{color:rgba(255,255,255,.6)}

/* SECTION */
.section{margin-bottom:28px}
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.section-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
.hero-badge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.3px}
.section-line{flex:1;height:1px;background:var(--bdr)}

/* DELTA TABLE — HERO */
.delta-intro{font-size:13px;color:var(--txm);margin-bottom:14px;line-height:1.6;padding:10px 14px;background:var(--sur);border-radius:7px;border-left:3px solid var(--acc)}
.delta-tbl{width:100%;border-collapse:collapse;background:var(--sur);border-radius:10px;overflow:hidden;border:1px solid var(--bdr);margin-bottom:10px}
.delta-tbl thead tr{background:var(--sur2)}
.delta-tbl th{padding:10px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txm);text-align:left;border-bottom:1px solid var(--bdr)}
.delta-tbl td{padding:11px 12px;font-size:12px;border-bottom:1px solid var(--sur2);vertical-align:top;line-height:1.5}
.delta-tbl tr:last-child td{border-bottom:none}
.delta-tbl td:first-child{font-weight:600;color:var(--tx);font-size:12px;width:14%}
.delta-tbl td:nth-child(2){width:22%;color:var(--txm);font-size:12px}
.delta-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:4px;border:1px solid}
.dp-sup{background:var(--sup-l);color:var(--sup);border-color:var(--sup-b)}
.dp-conf{background:var(--conf-l);color:var(--conf);border-color:var(--conf-b)}
.dp-nuance{background:var(--nuance-l);color:var(--nuance);border-color:var(--nuance-b)}
.dp-early{background:var(--warn-l);color:var(--warn);border-color:var(--warn-b)}
.dp-delta{background:var(--delta-l);color:var(--delta);border-color:var(--delta-b)}
.prac-int{font-size:12px;color:var(--tx);line-height:1.5}
.prac-int strong{color:var(--acc)}
.action-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-top:4px;background:var(--acc-l);color:var(--acc);border:1px solid #C5D5E8}
.action-tag.hold{background:var(--warn-l);color:var(--warn);border-color:var(--warn-b)}
.action-tag.change{background:var(--delta-l);color:var(--delta);border-color:var(--delta-b)}
.study-ref-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:1px 6px;background:#F0F4F8;border:1px solid #C5D5E8;border-radius:3px;color:var(--acc);cursor:pointer;font-family:var(--fn);font-weight:500;margin-top:3px}
.study-ref-btn:hover{background:var(--acc-l)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:16px;gap:0}
.tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.tab:hover:not(.active){color:var(--tx)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* SEVERITY */
.sev-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sev-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.sev-card-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:12px;font-weight:700;color:var(--tx);display:flex;align-items:center;justify-content:space-between}
.sev-card-bd{padding:12px 14px}
.crit-major{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--conf);margin-bottom:6px}
.crit-minor{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--warn);margin-bottom:6px;margin-top:10px}
.crit-item{font-size:12px;color:var(--tx);padding:4px 0;border-bottom:1px solid var(--sur2);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.crit-item:last-child{border-bottom:none}
.crit-dot{width:5px;height:5px;border-radius:50%;background:var(--bdr2);flex-shrink:0;margin-top:5px}
.crit-dot.red{background:var(--conf-b)}
.crit-dot.amber{background:var(--warn-b)}
.score-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.score-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.score-name{font-size:13px;font-weight:700}
.score-desc{font-size:11px;color:var(--txm);margin-top:1px}
.score-body{padding:12px 14px}
.score-var{margin-bottom:8px}
.score-var-lbl{font-size:11px;color:var(--txm);margin-bottom:3px}
.score-sel{width:100%;padding:5px 8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:12px;font-family:var(--fn);outline:none;cursor:pointer}
.score-sel:focus{border-color:var(--acc)}
.score-result{padding:10px 12px;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr);margin-top:10px}
.score-num{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--acc);line-height:1}
.score-interp{font-size:12px;margin-top:3px;font-weight:500}
.score-action{font-size:11px;color:var(--txm);margin-top:4px;line-height:1.4}
.score-row{padding:5px 8px;border-radius:4px;font-size:11px;margin-bottom:2px;border:1px solid transparent;opacity:.4;line-height:1.4}
.score-row.active{opacity:1;font-weight:600}
.score-lo{background:var(--sup-l);border-color:var(--sup-b);color:var(--sup)}
.score-md{background:var(--warn-l);border-color:var(--warn-b);color:var(--warn)}
.score-hi{background:var(--conf-l);border-color:var(--conf-b);color:var(--conf)}

/* WORKUP */
.workup-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--sur2)}
.workup-row:last-child{border-bottom:none}
.workup-check{width:14px;height:14px;accent-color:var(--acc);margin-top:2px;flex-shrink:0;cursor:pointer}
.workup-main{flex:1}
.workup-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.workup-why{font-size:11px;color:var(--txm);line-height:1.4}
.workup-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px;margin-bottom:2px}
.wt-routine{background:#EBF0F7;color:var(--acc);border:1px solid #C5D5E8}
.wt-selective{background:var(--warn-l);color:var(--warn);border:1px solid var(--warn-b)}
.wt-severe{background:var(--conf-l);color:var(--conf);border:1px solid var(--conf-b)}
.stat-pills{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.stat-p{font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:3px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txm)}
.stat-p span{color:var(--tx);font-weight:500}

/* TREATMENT */
.tx-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;margin-bottom:12px;overflow:hidden}
.tx-hd{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tx-name{font-size:14px;font-weight:700;color:var(--tx)}
.tx-class{font-size:11px;color:var(--txm);margin-top:1px}
.tx-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center}
.tt{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;border:1px solid}
.tt-1l{background:var(--acc-l);color:var(--acc);border-color:#C5D5E8}
.tt-2l{background:var(--sur2);color:var(--txm);border-color:var(--bdr)}
.tt-pref{background:var(--sup-l);color:var(--sup);border-color:var(--sup-b)}
.tt-ren{background:var(--warn-l);color:var(--warn);border-color:var(--warn-b)}
.tx-bd{padding:14px 16px}
.dose-tbl{width:100%;border-collapse:collapse;margin-bottom:10px}
.dose-tbl td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--sur2);vertical-align:top}
.dose-tbl tr:last-child td{border-bottom:none}
.dose-lbl{color:var(--txm);width:32%;font-size:11px;padding-top:8px}
.dose-val{color:var(--acc);font-family:var(--mono);font-size:12px;font-weight:500}
.dose-note{font-size:11px;color:var(--txm);font-family:var(--fn);margin-top:2px}
.tx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.tx-sec{background:var(--sur2);border-radius:6px;padding:10px 12px;border:1px solid var(--bdr)}
.tx-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.tx-sec-title.red{color:var(--conf)}
.tx-sec-title.amber{color:var(--warn)}
.tx-sec-title.blue{color:var(--acc)}
.tx-sec-title.grn{color:var(--sup)}
.tx-item{font-size:11px;color:#5A5550;padding:3px 0;border-bottom:1px solid var(--bdr);line-height:1.4}
.tx-item:last-child{border-bottom:none}
.tx-item::before{content:'— ';color:var(--bdr2)}
.ev-block{margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)}
.ev-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txs);margin-bottom:7px}
.ev-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--sur2);flex-wrap:wrap}
.ev-row:last-child{border-bottom:none}
.ev-trial-btn{font-size:11px;font-weight:600;padding:3px 9px;background:var(--acc-l);border:1px solid #C5D5E8;border-radius:4px;color:var(--acc);cursor:pointer;font-family:var(--fn);flex-shrink:0}
.ev-trial-btn:hover{background:#DDE8F2}
.ev-grade{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;font-family:var(--mono);flex-shrink:0}
.ev-A{background:#EBF7F0;color:var(--sup);border:1px solid var(--sup-b)}
.ev-B{background:var(--warn-l);color:var(--warn);border:1px solid var(--warn-b)}
.ev-C{background:var(--sur2);color:var(--txm);border:1px solid var(--bdr)}
.ev-key{font-size:11px;color:var(--tx);background:var(--acc-l);padding:3px 8px;border-radius:3px;margin-top:2px;width:100%;line-height:1.4;border:1px solid #C5D5E8}
.ev-apply{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;margin-left:auto;flex-shrink:0}
.apply-yes{background:var(--sup-l);color:var(--sup);border:1px solid var(--sup-b)}
.apply-no{background:var(--sur2);color:var(--txs);border:1px solid var(--bdr)}
.apply-unk{background:var(--warn-l);color:var(--warn);border:1px solid var(--warn-b)}

/* SPECIAL SITUATIONS ACCORDION */
.acc-item{border:1px solid var(--bdr);border-radius:7px;margin-bottom:6px;overflow:hidden;background:var(--sur)}
.acc-trigger{padding:11px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;justify-content:space-between;user-select:none}
.acc-trigger:hover{background:var(--sur2)}
.acc-arrow{font-size:10px;color:var(--txm);transition:transform .2s}
.acc-item.open .acc-arrow{transform:rotate(90deg)}
.acc-body{display:none;padding:12px 14px;border-top:1px solid var(--bdr);font-size:12px;line-height:1.6;color:#4A4540}
.acc-item.open .acc-body{display:block}
.acc-change{font-weight:600;color:var(--tx);margin-bottom:3px;margin-top:8px;font-size:12px}
.acc-change:first-child{margin-top:0}
.acc-ev{font-size:10px;font-weight:600;display:inline-block;padding:1px 5px;border-radius:3px;margin-left:6px;background:var(--warn-l);color:var(--warn);border:1px solid var(--warn-b)}

/* FOLLOW UP */
.fu-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--sur2);font-size:12px;color:#4A4540}
.fu-item:last-child{border-bottom:none}
.fu-num{width:20px;height:20px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,15,10,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--sur)}
.modal-title{font-size:14px;font-weight:700;line-height:1.3}
.modal-x{background:transparent;border:none;color:var(--txm);font-size:20px;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.modal-body{padding:16px 20px}
.m-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px}
.m-lbl{color:var(--txm);min-width:120px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;padding-top:2px}
.m-val{color:var(--tx);line-height:1.5;flex:1}
.m-div{height:1px;background:var(--bdr);margin:12px 0}
.m-key{padding:10px 12px;background:var(--acc-l);border-radius:6px;border:1px solid #C5D5E8;font-size:12px;color:var(--acc);line-height:1.5;margin-top:8px;font-weight:500}
.pt-apply-block{padding:12px;background:var(--sup-l);border-radius:6px;border:1px solid var(--sup-b);margin-top:10px;font-size:12px;color:var(--sup);line-height:1.5}
.pt-apply-no{background:var(--conf-l);border-color:var(--conf-b);color:var(--conf)}
.pt-apply-unk{background:var(--warn-l);border-color:var(--warn-b);color:var(--warn)}
.form-row{margin-bottom:10px}
.form-lbl{font-size:10px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;display:block}
.form-inp{width:100%;padding:7px 10px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:13px;font-family:var(--fn);outline:none}
.form-inp:focus{border-color:var(--acc)}
.form-sel{width:100%;padding:7px 10px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:13px;font-family:var(--fn);outline:none;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.comorbid-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.comorbid-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.comorbid-item input{accent-color:var(--acc);cursor:pointer}
.save-btn{width:100%;padding:9px;background:var(--acc);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);margin-top:10px}
.save-btn:hover{opacity:.88}

/* UTILS */
.chip{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;border:1px solid}
.mono{font-family:var(--mono)}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section{animation:fadein .2s ease}


/* HOMEPAGE EXTRAS */
.topbar-home { position:sticky;top:0;z-index:100; }

/* App container */
#app{min-height:100vh}

function CAP_patientApply(study){
  if(!CAP_S.patient) return 'unk';
  const sd = CAP_DATA.studies[study];
  if(!sd) return 'unk';
  const p = CAP_S.patient;
  if(sd.exclusion){
    const e = sd.exclusion.toLowerCase();
    if(p.immunocomp && (e.includes('immunocomp')||e.includes('immunosuppres'))) return 'no';
    if(p.comorbidities && p.comorbidities.includes('hematologic') && e.includes('hematologic')) return 'no';
    if(p.comorbidities && p.comorbidities.includes('sot') && e.includes('organ transplant')) return 'no';
  }
  if(sd.inclusion){
    const inc = sd.inclusion.toLowerCase();
    const ageMatch = inc.includes('≥18') ? (p.age>=18) : true;
    if(!ageMatch) return 'no';
    if(inc.includes('icu') && !p.icu && CAP_S.txTab!=='severe') return 'unk';
  }
  return 'yes';
}

function CAP_applyBadge(result){
  if(result==='yes') return `<span class="ev-apply apply-yes">✓ Applies</span>`;
  if(result==='no') return `<span class="ev-apply apply-no">✗ Excluded</span>`;
  return `<span class="ev-apply apply-unk">? Enter pt.</span>`;
}

function relPill(rel){
  const map={supports:['dp-sup','Supports guideline'],conflict:['dp-conf','May conflict'],nuance:['dp-nuance','Adds nuance'],early:['dp-early','Early signal']};
  const [cls,lbl] = map[rel] || ['dp-delta','Δ Change'];
  return `<div class="delta-pill ${cls}">${lbl}</div>`;
}

function actionBadge(a){
  if(a==='no-change') return `<span class="action-tag">No action change</span>`;
  if(a==='change') return `<span class="action-tag change">⚡ Consider adopting</span>`;
  if(a==='reinforces') return `<span class="action-tag">Reinforces current care</span>`;
  if(a==='consider') return `<span class="action-tag hold">Consider in select pts</span>`;
  return '';
}

function gradeE(g){
  return `<span class="ev-grade ev-${g}">Grade ${g}</span>`;
}

function CAP_updateCurb(){
  const vars = ['conf','bun','rr','sbp','age'];
  let total = 0;
  vars.forEach(id=>{const el=document.getElementById(`curb-${id}`);if(el) total+=parseInt(el.value)||0;});
  const numEl = document.getElementById('curb-num');
  if(numEl) numEl.textContent = total;
  CAP_DATA.scores.curb65.interp.forEach(i=>{
    const el=document.getElementById(`curb-r-${i.range[0]}-${i.range[1]}`);
    if(!el) return;
    const match = total>=i.range[0] && total<=i.range[1];
    el.className=`score-row score-${i.color} ${match?'active':''}`;
  });
}

function CAP_updatePsi(){
  const vars = ['age2','comorbid','vitals','labs2','cxr2'];
  let total = 0;
  vars.forEach(id=>{const el=document.getElementById(`psi-${id}`);if(el) total+=parseInt(el.value)||0;});
  const numEl = document.getElementById('psi-num');
  if(numEl) numEl.textContent = total;
  CAP_DATA.scores.psi.interp.forEach((i,idx)=>{
    const el=document.getElementById(`psi-r-${idx}`);
    if(!el) return;
    const match = total>=i.range[0] && total<=i.range[1];
    el.className=`score-row score-${i.color} ${match?'active':''}`;
  });
}

function CAP_toggleAcc(i){CAP_S.accordions[i]=!CAP_S.accordions[i];CAP_R();}
function CAP_scrollTo(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}
function CAP_openPatientModal(){CAP_S.modal='patient';CAP_R();}
function CAP_closeModal(){CAP_S.modal=null;CAP_R();}
function CAP_openStudyModal(key){CAP_S.modal={type:'study',key};CAP_R();}

function CAP_savePatient(){
  const age = parseInt(document.getElementById('pt-age').value)||null;
  const sex = document.getElementById('pt-sex').value;
  const crcl = parseFloat(document.getElementById('pt-crcl').value)||null;
  const setting = document.getElementById('pt-setting').value;
  const o2 = document.getElementById('pt-o2').value;
  const flags = ['immunocomp','pcn_allergy','qtc','ckd','structural_lung','prior_mrsa','pregnant','sot'];
  const obj = {age,sex,crcl,setting,o2};
  flags.forEach(f=>{obj[f]=document.getElementById(`pt-${f}`)?.checked||false;});
  CAP_S.patient=obj;
  if(setting==='ICU / Severe'||o2==='HFNC or MV') CAP_S.txTab='severe';
  else if(setting==='Outpatient') CAP_S.txTab='outpatient';
  else CAP_S.txTab='inpatient';
  CAP_S.workupTab=CAP_S.txTab==='severe'?'severe':CAP_S.txTab;
  CAP_closeModal();
}

function CHF_patientApply(study){
  if(!CHF_S.patient) return 'unk';
  const sd = CHF_DATA.studies[study];
  if(!sd) return 'unk';
  const p = CHF_S.patient;
  if(sd.exclusion){
    const e = sd.exclusion.toLowerCase();
    if(p.immunocomp && e.includes('immunocomp')) return 'no';
    if(p.egfr_low && (e.includes('egfr <20')||e.includes('egfr <15'))) return 'no';
    if(p.t1dm && e.includes('t1dm')) return 'no';
  }
  return 'yes';
}

function CHF_updateEsc(){
  const vars = ['uo','cr','sbp3','cold2','o2rise'];
  let total = 0;
  vars.forEach(id=>{const el=document.getElementById('esc-'+id);if(el) total+=parseInt(el.value)||0;});
  const numEl = document.getElementById('esc-num');
  if(numEl) numEl.textContent = total;
  CHF_DATA.escalation.interp.forEach(i=>{
    const el=document.getElementById('esc-r-'+i.range[0]+'-'+i.range[1]);
    if(!el) return;
    const match = total>=i.range[0] && total<=i.range[1];
    el.className='score-row score-'+i.color+' '+(match?'active':'');
  });
}

function CHF_scrollTo(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}
function CHF_openPatientModal(){CHF_S.modal='patient';CHF_R();}
function CHF_closeModal(){CHF_S.modal=null;CHF_R();}
function CHF_openStudyModal(key){CHF_S.modal={type:'study',key};CHF_R();}
function CHF_toggleAcc(i){CHF_S.accordions[i]=!CHF_S.accordions[i];CHF_R();}

function CHF_savePatient(){
  const age = parseInt(document.getElementById('chf-pt-age').value)||null;
  const sex = document.getElementById('chf-pt-sex').value;
  const ef = document.getElementById('chf-pt-ef').value;
  const profile = document.getElementById('chf-pt-profile').value;
  const egfr = parseFloat(document.getElementById('chf-pt-egfr').value)||null;
  const k = parseFloat(document.getElementById('chf-pt-k').value)||null;
  const flags = ['t1dm','immunocomp','egfr_low','afi','iron_def','prior_hf'];
  const obj = {age,sex,ef,profile,egfr,k};
  flags.forEach(f=>{obj[f]=document.getElementById('chf-pt-'+f)?.checked||false;});
  CHF_S.patient = obj;
  if(profile==='Cold & Wet'||profile==='Cold & Dry') CHF_S.txTab='severe';
  else if(profile==='Warm & Wet') CHF_S.txTab='outpatient';
  CHF_closeModal();
}

function chipClick(el){
  const page = el.getAttribute('data-page');
  if(!page) { showComingSoon(); return; }
  navigate(page);
}
function homeSearch(val){
  const results = document.getElementById('home-search-results');
  if(!val || val.length < 2){results.style.display='none';return;}
  const diseases = [
    {name:'Community-Acquired Pneumonia',tags:'CAP pneumonia lung respiratory ID',page:'cap'},
    {name:'Acute Decompensated Heart Failure',tags:'ADHF CHF heart failure cardiology',page:'chf'},
    {name:'COPD Exacerbation (coming soon)',tags:'COPD pulm respiratory',page:null},
    {name:'DKA - Diabetic Ketoacidosis (coming soon)',tags:'DKA diabetes endocrine',page:null},
  ];
  const matches = diseases.filter(d=>(d.name+' '+d.tags).toLowerCase().includes(val.toLowerCase()));
  if(!matches.length){results.style.display='none';return;}
  results.innerHTML = matches.map(m=>`
    <div onclick="${m.page?`navigate('${m.page}')`:''}" style="padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:${m.page?'pointer':'default'};display:flex;align-items:center;justify-content:space-between" onmouseover="if(${m.page?'true':'false'})this.style.background='var(--sur2)'" onmouseout="this.style.background=''">
      <span style="font-size:13px;font-weight:${m.page?'500':'400'};color:${m.page?'var(--tx)':'var(--txm)'}">${m.name}</span>
      ${m.page?`<span style="font-size:10px;color:var(--acc)">Open →</span>`:''}
    </div>
  `).join('');
  results.style.display='block';
}

function showComingSoon(){
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:16px;right:16px;background:var(--tx);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:999;font-family:var(--fn)';
  el.textContent = 'Coming soon — CAP and CHF are live today.';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}


// ============================================================
// ROUTING
// ============================================================

let CURRENT_PAGE = 'home';

function navigate(page){
  CURRENT_PAGE = page;
  const app = document.getElementById('app');
  if(app) app.scrollTop = 0;
  MAIN_R();
}

function MAIN_R(){
  try {
    const app = document.getElementById('app');
    if(!app) return;
    if(CURRENT_PAGE === 'home') {
      app.innerHTML = renderHomePage();
    } else if(CURRENT_PAGE === 'cap') {
      app.innerHTML = CAP_render() + CAP_renderModal();
      setTimeout(()=>{CAP_updateCurb();CAP_updatePsi();}, 10);
    } else if(CURRENT_PAGE === 'chf') {
      app.innerHTML = CHF_render() + CHF_renderModal();
      setTimeout(()=>{CHF_updateEsc();}, 10);
    }
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div style="padding:2rem;font-family:monospace;color:red;background:#fff;"><strong>JS Error:</strong><pre>' + e.message + '\n' + e.stack + '</pre></div>';
  }
}

// Init
MAIN_R();

</script>
</body>
</html>
