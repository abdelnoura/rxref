symptoms:[
{name:'Epigastric pain radiating to back',cat:'Symptoms',sn:85,sp:65,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Classic presentation: sudden-onset severe epigastric pain radiating straight through to the back. Worse after eating and when supine. Improved by leaning forward ("prayer position"). Band-like distribution. Constant (not colicky — colicky suggests biliary colic, not pancreatitis).'},
{name:'Nausea and vomiting',cat:'Symptoms',sn:75,sp:35,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Present in 75-90% of AP. Persistent vomiting may indicate gastric outlet obstruction from pancreatic inflammation/pseudocyst. Bilious vomiting without relief of pain differentiates from SBO or biliary colic.'},
{name:'Epigastric tenderness with guarding',cat:'Exam',sn:80,sp:55,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Epigastric tenderness is nearly universal. Guarding suggests severe inflammation or peritonitis. Relative lack of peritoneal signs despite severe pain is characteristic (retroperitoneal inflammation). Board-like rigidity → consider perforated viscus as alternative diagnosis.'},
{name:'Abdominal distension / decreased bowel sounds',cat:'Exam',sn:50,sp:60,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Paralytic ileus from retroperitoneal inflammation. Sentinel loop on X-ray (dilated jejunal loop near pancreas). Persistent distension >5-7 days → CT to evaluate for complications (pseudocyst, WON, or colonic involvement).'},
{name:'Tachycardia (HR >100)',cat:'Vitals',sn:55,sp:50,ppv:null,npv:null,ref:'ACG_AP_2024',note:'From pain, hypovolemia (third-spacing), or systemic inflammation. Persistent tachycardia despite adequate resuscitation → evaluate for organ failure, infected necrosis, or alternative diagnosis.'},
{name:'Fever (T >38.5°C)',cat:'Vitals',sn:40,sp:65,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Mild fever common in first 48-72h (SIRS from inflammation). Fever >38.5°C beyond day 7-10 → suspect infected necrosis. Early fever (day 1-3) is usually sterile inflammation — do not start antibiotics empirically.'},
{name:'Cullen sign (periumbilical ecchymosis)',cat:'Exam',sn:3,sp:99,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Retroperitoneal hemorrhage tracking to periumbilical region. Pathognomonic but rare (<3%). When present, indicates hemorrhagic/necrotizing pancreatitis. Very high specificity — do not dismiss.'},
{name:'Grey Turner sign (flank ecchymosis)',cat:'Exam',sn:3,sp:99,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Retroperitoneal hemorrhage tracking to flanks. Equally rare and specific as Cullen sign. Appears 24-72h after onset. Both signs predict severe AP and high mortality.'},
{name:'Jaundice / scleral icterus',cat:'Exam',sn:null,sp:null,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Suggests biliary etiology — gallstone impacted at ampulla or CBD dilation from edema. Bilirubin >4 mg/dL + dilated CBD → evaluate for persistent obstruction (MRCP or EUS). Rising bilirubin + fever + RUQ pain = cholangitis → urgent ERCP.'},
{name:'Dyspnea / decreased breath sounds at bases',cat:'Respiratory',sn:30,sp:70,ppv:null,npv:null,ref:'ACG_AP_2024',note:'Pleural effusion (usually left-sided) from diaphragmatic inflammation. Occurs in 15-20% of AP. ARDS in severe AP (organ failure criterion). Hypoxemia without obvious pulmonary cause → check lipase, consider AP as ARDS trigger.'},

workup:{
outpatient:[
{cat:'Laboratory',name:'Serum lipase (preferred) — ≥3× ULN diagnostic',tag:'routine',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'Lipase is MORE sensitive and specific than amylase for AP. Remains elevated longer (7-14 days vs 3-5 days for amylase). Magnitude of elevation does NOT correlate with severity. Normal lipase essentially excludes AP. Do NOT order both lipase and amylase — lipase alone is sufficient.'},
{cat:'Laboratory',name:'CBC, CMP (BMP + LFTs), lactate',tag:'routine',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'LFTs: ALT >3× ULN has 95% PPV for gallstone AP etiology. BUN: rising BUN despite fluids predicts severity (hemoconcentration). Glucose: >200 mg/dL at admission = poor prognosis. Ca²⁺: hypocalcemia predicts necrosis and severity (Ranson criterion).'},
{cat:'Imaging',name:'RUQ ultrasound',tag:'routine',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'MANDATORY in ALL AP — evaluate for gallstones as etiology. Gallstones/sludge found in 35-40% of AP. Dilated CBD (>6mm or >8mm post-cholecystectomy) suggests choledocholithiasis. US is first-line; MRCP if US inconclusive. Do NOT skip — missing gallstone etiology means missing cholecystectomy indication.'},
{cat:'Laboratory',name:'Triglycerides',tag:'routine',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'TG ≥1000 mg/dL is a recognized cause of AP (5-10% of cases). Check in ALL AP without clear gallstone or alcohol etiology. TG >500 mg/dL at admission may be causative. Severe hypertriglyceridemia may lower measured lipase (assay interference) — AP can occur with "normal" lipase in severe HTG.'},
{cat:'Laboratory',name:'Calcium (ionized preferred)',tag:'routine',ref:'ACG_AP_2024',why:'Hypocalcemia: fat saponification consumes calcium in necrotizing AP. Corrected Ca²⁺ <8 mg/dL predicts severe AP (Ranson criterion). Conversely, hypercalcemia (from hyperparathyroidism) can CAUSE AP — check PTH if calcium elevated.'},
],
inpatient:[
{cat:'Laboratory',name:'All outpatient labs above + CRP at 48h',tag:'routine',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'CRP >150 mg/L at 48h predicts necrosis and severe AP with 80% accuracy. More useful than admission CRP (peaks at 48-72h). Serial BUN trending monitors response to resuscitation — falling BUN = adequate hydration.'},
{cat:'Laboratory',name:'BMP q12-24h during active resuscitation',tag:'routine',ref:'ACG_AP_2024',why:'Monitor BUN (hemoconcentration marker), creatinine (AKI from hypovolemia), potassium (vomiting + fluid shifts), glucose (endocrine dysfunction). Daily Ca²⁺/Mg²⁺.'},
{cat:'Imaging',name:'CT abdomen with IV contrast — at 72-96h (NOT at admission)',tag:'selective',ref:'ACG_AP_2024',glRef:'ACG_AP_2024',why:'Do NOT get CT at admission for AP diagnosis (clinical + lipase is sufficient). CT at 72-96h if: (1) not improving clinically, (2) suspected necrotizing pancreatitis, (3) fever beyond day 7 (infected necrosis). Necrosis best visualized after 72h. Contrast-enhanced CT: non-enhancing pancreas = necrosis.'},
{cat:'Imaging',name:'MRCP — if biliary etiology suspected but US inconclusive',tag:'selective',ref:'ACG_AP_2024',why:'MRCP sensitivity 95% for CBD stones (vs US 50%). Order if: ALT >3× ULN but US shows no gallstones, dilated CBD without visible stone, or recurrent "idiopathic" AP (look for microlithiasis, pancreas divisum). Alternative: EUS (operator-dependent, can also perform FNA).'},
{cat:'Imaging',name:'EUS — if MRCP inconclusive or FNA needed',tag:'selective',ref:'TENSION2018',why:'EUS detects microlithiasis, small CBD stones, and pancreas divisum missed by MRCP. EUS-guided FNA of pancreatic collections for culture (infected necrosis). EUS-guided drainage of WON (TENSION trial: endoscopic step-up approach).'},
],
severe:[
{cat:'Laboratory',name:'All inpatient labs above + serial lactate, ABG',tag:'severe',ref:'ACG_AP_2024',why:'Organ failure monitoring: lactate for tissue perfusion, ABG for respiratory failure (ARDS), serial creatinine for AKI. Modified Marshall score q12h for organ failure classification per Revised Atlanta.'},
{cat:'Imaging',name:'CT abdomen with contrast at 72-96h and repeat at 7-10 days if febrile',tag:'severe',ref:'ACG_AP_2024',why:'Day 3-4 CT: quantify necrosis extent and identify local complications (APFC, ANC, vascular complications). Day 7-10+ CT if new fever: gas bubbles within necrosis = infected necrosis (highly specific). Guides decision for drainage vs antibiotics.'},
{cat:'Microbiology',name:'Blood cultures (if fever, leukocytosis, new organ failure after day 7)',tag:'severe',ref:'ACG_AP_2024',why:'Bacteremia from translocation or infected necrosis. Infection is the primary driver of late mortality (>2 weeks) in severe AP. Culture before starting antibiotics. Most common organisms: E. coli, Klebsiella, Enterococcus, Enterobacter.'},
{cat:'Imaging',name:'CT-guided or EUS-guided FNA of necrosis (if infected necrosis suspected)',tag:'severe',ref:'PANTER2012',why:'Gram stain + culture of necrotic collection confirms infection and guides antibiotic therapy. However, routine FNA is falling out of favor — gas on CT or clinical sepsis is sufficient to diagnose infected necrosis and start antibiotics without FNA. FNA reserved for diagnostic uncertainty.'},
]

delta:[
{topic:'Moderate (not aggressive) fluids — WATERFALL',guideline:'Aggressive IV fluid resuscitation (250-500 mL/hr boluses) was standard',glRef:'ACG_AP_2024',relationship:'conflict',evidence:'WATERFALL (NEJM 2022, n=249): aggressive fluids (3 mL/kg/hr) did NOT reduce severity and caused fluid overload in 20.5% vs 6.3% with moderate fluids. Trial stopped early for futility and harm in aggressive arm.',practical:'LR at 1.5 mL/kg/hr, titrate to UO and BUN response. Bolus only if hypovolemic. Do NOT give 250-500 mL/hr boluses routinely. WATERFALL changed practice globally — moderate goal-directed resuscitation is the new standard.',action:'change',studies:['WATERFALL, NEJM 2022'],studyRefs:['WATERFALL2022']},
{topic:'Early oral feeding within 24h',guideline:'NPO for 48-72h then clear liquid → full liquid → solid diet progression',glRef:'ACG_AP_2024',relationship:'conflict',evidence:'Multiple RCTs + Dutch AP Nutrition (NEJM 2014): early oral feeding is safe, reduces LOS, and does not increase complications. 69% of predicted severe AP patients tolerate oral diet at 72h without tube. No benefit to prolonged NPO.',practical:'Offer low-fat solid diet within 24h for mild AP. No need for clear → full → solid progression. If not tolerating at 72h in severe AP → enteral tube feeding. TPN only if enteral impossible for >7 days.',action:'change',studies:['Dutch AP Nutrition, NEJM 2014'],studyRefs:['DUTCH_AP_NUTRITION']},
{topic:'Same-admission cholecystectomy for gallstone AP (PONCHO)',guideline:'Interval cholecystectomy 4-6 weeks after discharge',glRef:'PONCHO2015',relationship:'conflict',evidence:'PONCHO (Lancet 2015, n=266): same-admission cholecystectomy reduces recurrent biliary events from 17% to 5% (NNT 8). No increase in surgical complications. 17-20% recurrence while waiting for interval surgery.',practical:'Perform cholecystectomy BEFORE DISCHARGE in all mild gallstone AP. Do not schedule interval surgery — 1 in 5 patients will have a recurrent event while waiting. Exception: severe/necrotizing AP → defer until resolved.',action:'change',studies:['PONCHO, Lancet 2015'],studyRefs:['PONCHO2015']},
{topic:'Step-up approach for necrotizing pancreatitis (PANTER)',guideline:'Primary open necrosectomy for infected necrosis',glRef:'PANTER2012',relationship:'conflict',evidence:'PANTER (NEJM 2010): step-up (drain → minimally invasive debridement) reduces major complications from 69% to 40% vs open surgery. 35% resolve with drainage alone. TENSION (2018): endoscopic step-up may be superior to surgical step-up.',practical:'Infected necrosis: delay intervention to ≥4 weeks → percutaneous or EUS-guided drainage first → necrosectomy only if drainage fails. Primary open surgery is no longer acceptable as first-line. Endoscopic approach preferred at expert centers.',action:'change',studies:['PANTER, NEJM 2010','TENSION, Lancet 2018'],studyRefs:['PANTER2012','TENSION2018']},
{topic:'ERCP NOT routine for gallstone AP',guideline:'Early routine ERCP for all biliary pancreatitis',glRef:'ERCP_AP_2007',relationship:'conflict',evidence:'Cochrane 2007 + APEC (NEJM 2020): routine early ERCP does NOT reduce mortality or complications in biliary AP without cholangitis or persistent obstruction. ERCP carries 5-10% complication rate including post-ERCP pancreatitis.',practical:'ERCP only for: (1) acute cholangitis (urgent <24h), (2) persistent CBD obstruction (rising bilirubin + dilated duct not resolving). Otherwise, cholecystectomy alone is sufficient — most CBD stones pass spontaneously.',action:'change',studies:['Cochrane 2007','APEC, NEJM 2020'],studyRefs:['ERCP_AP_2007']},
{topic:'Probiotics are HARMFUL in severe AP (PROPATRIA)',guideline:'Probiotics considered beneficial for preventing infected necrosis',glRef:'PRODIGY2024',relationship:'conflict',evidence:'PROPATRIA (Lancet 2008): probiotics INCREASED mortality 2.5-fold in severe AP (16% vs 6%, p=0.01). Mechanism: non-occlusive mesenteric ischemia. Trial stopped for harm. No subsequent trial has shown benefit.',practical:'NEVER give probiotics for acute pancreatitis — any severity. This is one of the most important "do NOT do" results in GI medicine. Inform patients who ask about probiotic supplements during AP.',action:'change',studies:['PROPATRIA 2008'],studyRefs:['PRODIGY2024']},
{topic:'Rectal indomethacin prevents post-ERCP pancreatitis',guideline:'No routine PEP prophylaxis',glRef:'NSAID_PEP_2012',relationship:'nuance',evidence:'Elmunzer (NEJM 2012): rectal indomethacin 100mg reduces PEP by 50% (NNT 13). SOP trial (2020): benefit confirmed in average-risk patients. Now standard for ALL ERCP procedures.',practical:'Give rectal indomethacin 100mg to every patient undergoing ERCP — immediately before or after procedure. Standard of care regardless of PEP risk level. Simple, cheap, and highly effective.',action:'change',studies:['Elmunzer, NEJM 2012'],studyRefs:['NSAID_PEP_2012']},
{topic:'Morphine is safe in AP — no sphincter of Oddi concern',guideline:'Morphine avoided due to sphincter of Oddi spasm concern',glRef:'ACG_AP_2024',relationship:'conflict',evidence:'ACG 2024 and multiple systematic reviews: no clinical evidence that morphine worsens AP via sphincter of Oddi spasm. All opioids cause some sphincter contraction — clinically insignificant. Undertreated pain worsens AP outcomes.',practical:'Use morphine or hydromorphone when needed for AP pain. Do not avoid opioids based on sphincter of Oddi concerns — this is a persistent myth. Multimodal approach (acetaminophen + NSAID + opioid) is ideal.',action:'change',studies:['ACG 2024 Guideline'],studyRefs:['ACG_AP_2024']},

special:[
{
label:'Etiology workup — find the cause (not just treat the episode)',grade:'A',ref:'ACG_AP_2024',
content:`<strong>Identify etiology in every AP episode — prevents recurrence.</strong> <span class="cite cite-A" onclick='openStudy("ACG_AP_2024")'>ACG 2024 · A</span><br><br> <strong>Gallstones (35-40%):</strong> RUQ US mandatory. ALT >3× ULN = 95% PPV for gallstone etiology. CCY before discharge.<br> <strong>Alcohol (25-35%):</strong> Requires heavy, sustained use (typically >4-5 drinks/day for ≥5 years). Single binge rarely causes AP alone.<br> <strong>Hypertriglyceridemia (5-10%):</strong> TG ≥1000 mg/dL causative. Check in ALL non-gallstone, non-alcohol AP. May lower lipase assay (interference). Treat acutely with insulin drip ± apheresis.<br> <strong>Post-ERCP (5%):</strong> Most common iatrogenic cause. Prevented by rectal indomethacin 100mg.<br> <strong>Medications:</strong> Azathioprine, valproic acid, GLP-1 agonists, ACEi, statins (rare). Drug-induced AP is diagnosis of exclusion.<br> <strong>Autoimmune (1-2%):</strong> IgG4 elevation, pancreatic mass on CT that responds to steroids. Biopsy confirms.<br> <strong>"Idiopathic" (10-15%):</strong> After 2 episodes without etiology → EUS for microlithiasis, pancreas divisum, occult tumor. MRCP if EUS unavailable.`
},
{
label:'Revised Atlanta — understanding AP local complications',grade:'A',ref:'ATLANTA_REV_2012',
content:`<strong>Local complication terminology depends on timing and content:</strong> <span class="cite cite-A" onclick='openStudy("ATLANTA_REV_2012")'>Revised Atlanta 2012 · A</span><br><br> <strong><4 weeks from AP onset:</strong><br> • <strong>APFC</strong> (Acute Peripancreatic Fluid Collection): no necrosis, no wall. Resolves spontaneously in most cases. Do NOT drain.<br> • <strong>ANC</strong> (Acute Necrotic Collection): contains necrotic tissue ± fluid. No mature wall yet. Drainage risky — lacks wall to anchor catheter.<br><br> <strong>≥4 weeks from AP onset:</strong><br> • <strong>Pseudocyst:</strong> encapsulated fluid WITHOUT necrosis. Well-defined wall. Drain if symptomatic (pain, obstruction) or >6 cm. Often resolves spontaneously.<br> • <strong>WON</strong> (Walled-Off Necrosis): encapsulated necrotic tissue WITH mature wall. This is what you drain/debride. Step-up approach: drainage first → necrosectomy only if needed.<br><br> <strong>Infected necrosis:</strong> Gas on CT (pathognomonic) or positive FNA culture. Occurs at 2-4 weeks. Leading cause of late mortality. Treat with carbapenems + drainage (step-up approach, delay to ≥4 weeks if clinically stable).`
},
{
label:'When to get CT — timing matters',grade:'A',ref:'ACG_AP_2024',
content:`<strong>Do NOT get CT at admission for AP diagnosis.</strong> <span class="cite cite-A" onclick='openStudy("ACG_AP_2024")'>ACG 2024 · A</span><br><br> <strong>CT is NOT needed if:</strong> Classic pain + lipase ≥3× ULN → diagnosis is established. CT adds radiation, cost, and contrast risk without changing initial management.<br><br> <strong>When to get CT:</strong><br> • <strong>72-96h:</strong> If not improving clinically. This is the optimal time to assess necrosis (necrosis not visible on CT before 72h).<br> • <strong>Day 7-10+:</strong> If new fever, rising WBC, or clinical deterioration. Look for: gas in necrosis (infected necrosis), pseudoaneurysm, portal/splenic vein thrombosis, colonic involvement.<br> • <strong>At ≥4 weeks:</strong> Before planned intervention — assess WON maturity, anatomy for drainage approach.<br><br> <strong>CT protocol:</strong> IV contrast essential to identify necrosis (non-enhancing pancreas). Oral contrast not needed. Arterial + portal venous phases. Thin-cut (3-5mm) for vascular complications.`
},
{
label:'Alcohol-induced pancreatitis — counseling and prevention',grade:'A',ref:'ACG_AP_2024',
content:`<strong>Alcohol is the second most common AP cause and the most common chronic pancreatitis cause.</strong><br><br> <strong>Key facts:</strong><br> • Requires sustained heavy use: typically >4-5 drinks/day for ≥5 years<br> • First episode may seem "acute" but often represents first clinical manifestation of already-developing chronic disease<br> • Continued drinking after first episode → 40-50% recurrence rate within 2 years<br> • Abstinence after first episode → recurrence rate drops to 10-15%<br> • Smoking + alcohol synergistically accelerates progression to chronic pancreatitis<br><br> <strong>At every pancreatitis encounter:</strong><br> • AUDIT-C screening<br> • Brief intervention (5 A's)<br> • Offer pharmacotherapy: naltrexone, acamprosate<br> • Refer to addiction medicine if alcohol use disorder diagnosed<br> • Smoking cessation (equally important — independent risk factor for CP progression)<br><br> <strong>Complete abstinence from alcohol is the single most effective intervention</strong> to prevent recurrence and slow progression to chronic pancreatitis.`
},
{
label:'Hypertriglyceridemic pancreatitis — acute management',grade:'B',ref:'ACG_AP_2024',
content:`<strong>TG ≥1000 mg/dL can cause AP. TG >500 in context of AP may be causative.</strong><br><br> <strong>Acute treatment:</strong><br> • <strong>Insulin drip</strong>: regular insulin 0.1-0.3 units/kg/hr with D5W. Activates lipoprotein lipase → clears TG. Target TG <500 within 24-48h.<br> • <strong>Dextrose co-infusion</strong>: prevents hypoglycemia during insulin infusion<br> • <strong>Apheresis/plasmapheresis</strong>: for TG >2000 or failure of insulin. Reduces TG 40-70% per session. Not available everywhere — insulin is first-line.<br> • <strong>Fibrate</strong> (fenofibrate 145mg daily): start once tolerating oral — chronic TG management<br> • <strong>Fish oil</strong> (omega-3 FA): modest TG reduction (~20-30%)<br><br> <strong>Key pitfall:</strong> Lipase may be falsely NORMAL in severe hypertriglyceridemia (assay interference). If clinical suspicion high + TG >1000 → treat as HTG pancreatitis regardless of lipase level.<br><br> <strong>Chronic prevention:</strong> Fibrate + dietary fat restriction (<20g fat/day during acute, then Mediterranean diet) + weight loss + diabetes control. Statin adds modest TG reduction.`
},
{
label:'Chronic pancreatitis — exocrine and endocrine insufficiency',grade:'A',ref:'APA_CHRONIC_2020',
content:`<strong>Chronic pancreatitis destroys both exocrine and endocrine function over time.</strong> <span class="cite cite-A" onclick='openStudy("APA_CHRONIC_2020")'>AGA/APA 2020 · A</span><br><br> <strong>Exocrine insufficiency (steatorrhea):</strong><br> • Fecal elastase <200 µg/g = exocrine insufficiency; <100 = severe<br> • PERT: 40,000-50,000 lipase units with meals, 25,000 with snacks<br> • Take with FIRST BITE of meal — enzymes must mix with food<br> • If response inadequate: increase dose up to 90,000/meal, add PPI, check compliance<br> • Monitor fat-soluble vitamins (A, D, E, K) — supplement deficiencies<br><br> <strong>Endocrine insufficiency (Type 3c diabetes):</strong><br> • Develops in 25-80% over disease course<br> • Brittle diabetes — lose both insulin AND glucagon → hypoglycemia risk<br> • HbA1c target 7-8% (avoid tight control → hypoglycemia)<br> • Often requires insulin (metformin first if mild)<br><br> <strong>Pancreatic cancer risk:</strong><br> • 2-5% lifetime risk in chronic pancreatitis<br> • Higher in hereditary, tropical, >20 year duration<br> • Screening: annual EUS or MRI (in hereditary CP or >20 year disease)`
},
],

function gradeB(g){const m={'A':'ev-A','B':'ev-B','C':'ev-C'};return `<span class="ev-grade ${m[g]||'ev-C'}">${g||'?'}</span>`;}
function cite(refKey){
  const r=REFS[refKey];if(!r)return '';
  const gc={'A':'cite-A','B':'cite-B','C':'cite-C'};
  return `<span class="cite ${gc[r.grade]||'cite-C'}" onclick='openStudy("${refKey}")'>${r.short} · ${r.grade}</span>`;
}
function statPill(val){
  if(val===null||val===undefined)return`<span class="stat-pill sp-na">—</span>`;
  const n=parseFloat(val);
  const c=n>=75?'sp-hi':n>=50?'sp-md':'sp-lo';
  return`<span class="stat-pill ${c}">${n}%</span>`;
}
function relPill(r){
  const m={supports:['rp-sup','Supports'],conflict:['rp-conf','May conflict'],nuance:['rp-nuance','Adds nuance'],early:['rp-early','Early signal']};
  const[c,l]=m[r]||['rp-nuance','Δ'];
  return`<div class="rel-pill ${c}">${l}</div>`;
}
function actionTag(a){
  const m={'no-change':'No action change','reinforces':'Reinforces current care','consider':'Consider in select pts','change':'⚡ Consider adopting'};
  const c=a==='change'?'chg':a==='consider'?'hold':'';
  return`<span class="act-tag ${c}">${m[a]||a}</span>`;
}
function patientApply(refKey){
  if(!S.patient)return'unk';
  const r=REFS[refKey];if(!r)return'unk';
  const e=(r.exclusion||'').toLowerCase();
  const p=S.patient;
  if(p.immunocomp&&(e.includes('immunocomp')||e.includes('immunosuppres')))return'no';
  if((p.comorbidities||[]).includes('sot')&&e.includes('transplant'))return'no';
  return'yes';
}
function applyBadge(refKey){
  const r=patientApply(refKey);
  if(r==='yes')return`<span class="apply-yes">✓ Applies</span>`;
  if(r==='no')return`<span class="apply-no">✗ Excluded</span>`;
  return`<span class="apply-unk">? Add patient</span>`;
}
function R(){
  const scroller=document.querySelector('.content');
  const top=scroller?scroller.scrollTop:0;
  document.getElementById('root').innerHTML=S.view==='home'?renderHome():(renderPage()+renderModal());
  const newScroller=document.querySelector('.content');

  applySidebar();
}

}

function renderStep03(c){

  const catDef={
    'Imaging':          {icon:'🩻',color:'#2A5A8C',bg:'#F0F6FC',border:'#C8DDF0'},
    'Laboratory':       {icon:'🧪',color:'#1A6B40',bg:'#F0FAF5',border:'#B8E8D0'},
    'Biomarkers':       {icon:'📈',color:'#7A5200',bg:'#FFFAF0',border:'#F0D080'},
    'Microbiology':     {icon:'🦠',color:'#8C2A2A',bg:'#FFF5F5',border:'#F0C0C0'},
    'Antigen / Serology':{icon:'💧',color:'#5A5A00',bg:'#FDFDF0',border:'#DEDE80'},
    'Imaging / Point-of-care':{icon:'📡',color:'#2A5A8C',bg:'#F0F6FC',border:'#C8DDF0'},
  };
  const catOrder=Object.keys(catDef);

  // Group by category preserving defined order
  const groups={};
  wkData.forEach(w=>{
    const cat=w.cat||'Other';
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(w);
  });
  const orderedGroups=[
    ...catOrder.filter(c=>groups[c]).map(c=>([c,groups[c]])),
    ...Object.entries(groups).filter(([c])=>!catOrder.includes(c))

  const renderItem=(w)=>`<div class="wk-row">
    <input type="checkbox" class="wk-cb">
    <div class="wk-body">
      <div class="wk-name">${w.name}<span class="wk-tag wt-${w.tag}">${w.tag==='routine'?'Routine':w.tag==='selective'?'Selective':'Severe only'}</span>
        ${w.ref?cite(w.ref):''} ${w.glRef&&w.glRef!==w.ref?cite(w.glRef):''}
      </div>
      <div class="wk-why">${w.why}</div>
      ${(w.sn!=null||w.sp!=null||w.ppv!=null||w.npv!=null)?`<div class="wk-stats">
        ${w.sn!=null?`<span class="wk-stat">Sn <span>${w.sn}%</span></span>`:''}
        ${w.sp!=null?`<span class="wk-stat">Sp <span>${w.sp}%</span></span>`:''}
        ${w.ppv!=null?`<span class="wk-stat">PPV <span>${w.ppv}%</span></span>`:''}
        ${w.npv!=null?`<span class="wk-stat">NPV <span>${w.npv}%</span></span>`:''}
      </div>`:''}
    </div>
  </div>`;

  return`<div class="step-section" id="step-03">
    <div class="step-hd"><span class="step-n">03</span><span class="step-title">Diagnostic Workup</span><div class="sline"></div><span class="step-sub">Every test cited to guideline or study</span></div>
    <div class="wk-tabs">${[['outpatient','Outpatient'],['inpatient','Inpatient Non-Severe'],['severe','Severe / ICU']].map(([id,lbl])=>`<div class="wk-tab ${S.wkTab===id?'active':''}" onclick="S.wkTab='${id}';R()">${lbl}</div>`).join('')}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${orderedGroups.map(([cat,items])=>{
        const d=catDef[cat]||{icon:'📋',color:'var(--txm)',bg:'var(--sur2)',border:'var(--bdr)'};
        return`<div style="border:1.5px solid ${d.border};border-radius:8px;overflow:hidden;background:var(--sur)">
          <div style="background:${d.bg};padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid ${d.border}">

          </div>

  </div>`;
}

function openDisease(id){if(!DISEASE_MAP[id])return;S.disease=DISEASE_MAP[id];S.view='disease';S.txTab='inpatient';S.wkTab='inpatient';S.accordions={};S.sidebarOpen=window.innerWidth>680;R();}
function applySidebar(){
  const nav=document.getElementById('lnav');
  const overlay=document.getElementById('lnav-overlay');
  if(!nav)return;
  const mobile=window.innerWidth<=680;
  if(mobile){
    nav.classList.toggle('open',S.sidebarOpen);
    nav.classList.remove('closed');
    overlay&&overlay.classList.toggle('show',S.sidebarOpen);
  } else {
    nav.classList.toggle('closed',!S.sidebarOpen);
    nav.classList.remove('open');
    overlay&&overlay.classList.remove('show');
  }
}
function toggleSymNote(i){
  const note=document.getElementById('sym-note-'+i);
  const arrow=document.getElementById('sym-arrow-'+i);
  if(!note)return;
  const open=note.style.display==='none';
  note.style.display=open?'':'none';
  if(arrow)arrow.textContent=open?'▾':'▸';
}
function toggleSidebar(){
  S.sidebarOpen=!S.sidebarOpen;
  applySidebar();
}
function openPtModal(){S.modal='patient';R();}
function closeModal(){S.modal=null;R();}
function openStudy(key){S.modal={type:'study',key};R();}
function updateScore(id){
  const sc=S.disease.scores?.[id];if(!sc)return;let total=0;
  sc.vars.forEach(v=>{const el=document.getElementById(`${id}-${v.id}`);if(el)total+=parseInt(el.value)||0;});
  const el=document.getElementById(`${id}-total`);if(el)el.textContent=total;
  sc.interp.forEach((i,idx)=>{
    const row=document.getElementById(`${id}-r-${idx}`);if(!row)return;
    const match=total>=i.range[0]&&total<=i.range[1];
    row.className=`score-row s-${i.color}${match?' active':''}`;
  });
}
function updateDx(dxId){
  const dx=S.disease.diagnosticCriteria.find(d=>d.id===dxId);
  if(!dx)return;
  const cbs=document.querySelectorAll(`[data-dx="${dxId}"]`);
  const checked=[...cbs].filter(cb=>cb.checked).length;
  // Major criteria are those marked req:true in the data
  const majorIds=dx.criteria.filter(cr=>cr.req).map(cr=>`${dxId}-${cr.id}`);
  const majorChecked=[...cbs].filter(cb=>cb.checked&&majorIds.includes(cb.id)).length;
  const minorChecked=checked-majorChecked;
  let status,msg;
  if(majorChecked>=1){status='met';msg=`✓ Criteria met — major criterion present: ${dx.trigger||'escalate care'}`;}
  else if(minorChecked>=3){status='met';msg=`✓ Criteria met — ${minorChecked} minor criteria (threshold ≥3)`;}
  else if(checked>0){status='partial';msg=`${minorChecked}/3 minor criteria — ${Math.max(0,3-minorChecked)} more needed (or 1 major)`;}
  else{status='notmet';msg='No criteria checked — check applicable findings above'}
  const el=document.getElementById(`dx-result-${dxId}`);
  if(el){el.className=`dx-result show ${status}`;el.textContent=msg;}
}
function savePatient(){
  const age=parseInt(document.getElementById('pt-age').value)||null;
  const sex=document.getElementById('pt-sex').value;
  const crcl=parseFloat(document.getElementById('pt-crcl').value)||null;
  const setting=document.getElementById('pt-setting').value;
  const o2=document.getElementById('pt-o2').value;
  const flags=['immunocomp','pcn_allergy','qtc','ckd','structural_lung','prior_mrsa','pregnant','sot'];
  const obj={age,sex,crcl,setting,o2,comorbidities:[]};
  flags.forEach(f=>{if(document.getElementById('pt-'+f)?.checked){obj[f]=true;obj.comorbidities.push(f);}});
  S.patient=obj;
  if(setting==='ICU / Severe'||o2==='HFNC or MV'){S.txTab='severe';S.wkTab='severe';}
  else if(setting==='Outpatient'){S.txTab='outpatient';S.wkTab='outpatient';}
  closeModal();
}

R();
loadEvidence();
