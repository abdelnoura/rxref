<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBMRef — Evidence-Based Medicine Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F4EF;--sur:#FFFFFF;--sur2:#EFECE5;--bdr:#E4DFD5;--bdr2:#D4CFC5;
  --tx:#1A1510;--txm:#6A6258;--txs:#9C9488;
  --acc:#2B4F7A;--acc-l:#EEF4FB;--acc-m:#6A9DC5;
  --grn:#1A5C3A;--grn-l:#EEF9F3;--grn-b:#4AAF7A;
  --red:#7A1A1A;--red-l:#FFF3F3;--red-b:#E06060;
  --amb:#7A4A00;--amb-l:#FFF9EE;--amb-b:#E8A030;
  --delta:#8A4500;--delta-l:#FFF6EE;--delta-b:#F09050;
  --fn:'Syne',sans-serif;--serif:'Instrument Serif',serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;line-height:1.5}

/* ─── SHELL ─── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:50px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;cursor:pointer}
.logo-mark{width:22px;height:22px;background:var(--acc);border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:12px;height:12px;fill:#fff}
.bc{font-size:12px;color:var(--txm);cursor:pointer}.bc:hover{color:var(--acc)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.tbtn{padding:5px 11px;border:1px solid var(--bdr);border-radius:5px;background:var(--sur);color:var(--txm);font-size:12px;font-family:var(--fn);cursor:pointer;font-weight:500}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.tbtn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.tbtn.has{background:var(--grn-l);border-color:var(--grn-b);color:var(--grn)}
.main-row{display:flex;flex:1;overflow:hidden;position:relative}
.lnav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49}
.lnav-overlay.show{display:block}

/* ─── LEFT NAV ─── */
.lnav{width:210px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .2s ease;z-index:50}
.lnav.closed{width:0;min-width:0;border-right:none;overflow:hidden}
@media(max-width:680px){
  .lnav{position:fixed;top:50px;left:0;bottom:0;width:210px;transform:translateX(-220px);transition:transform .2s ease;border-right:1px solid var(--bdr)}
  .lnav.open{transform:translateX(0)}
  .lnav.closed{width:210px;transform:translateX(-220px)}
}
.lnav::-webkit-scrollbar{width:3px}
.lnav::-webkit-scrollbar-thumb{background:var(--bdr)}
.sidebar-toggle{width:26px;height:26px;border:1px solid var(--bdr);border-radius:5px;background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txm);font-size:13px;line-height:1}
.sidebar-toggle:hover{border-color:var(--acc);color:var(--acc)}
.lnav-hd{padding:12px 14px 8px;border-bottom:1px solid var(--bdr)}
.lnav-lbl{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.nav-step{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px}
.nav-step:hover{background:var(--sur2)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--sur2);border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txm);flex-shrink:0;font-family:var(--mono)}
.step-lbl{font-size:12px;font-weight:500;color:var(--txm);line-height:1.3}
.pt-zone{padding:12px 14px;border-top:1px solid var(--bdr);margin-top:auto}
.pt-empty-lbl{font-size:11px;color:var(--txs);line-height:1.5;margin-bottom:8px}
.pt-add-btn{width:100%;padding:7px;background:var(--acc);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fn)}
.pt-filled{font-size:11px}
.pt-r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--sur2)}
.pt-r:last-child{border-bottom:none}
.pt-l{color:var(--txs)}.pt-v{font-weight:600;color:var(--tx);font-family:var(--mono);font-size:11px}
.pt-match{margin-top:8px;padding:8px 10px;background:var(--acc-l);border-radius:5px;border:1px solid #C3D5E8}
.pt-mt{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.pt-mi{font-size:11px;color:var(--acc);padding:2px 0;display:flex;gap:5px}
.pt-mi::before{content:'→';flex-shrink:0}
.pt-edit{font-size:11px;color:var(--acc);cursor:pointer;display:inline-block;margin-top:6px}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:0;background:var(--sur)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ─── HEADER ─── */
.d-hdr{padding:18px 28px 0;background:var(--sur);border-bottom:2px solid var(--tx)}
.d-title{font-family:var(--serif);font-size:27px;letter-spacing:-.5px;margin-bottom:4px}
.d-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-bottom:8px;font-size:11px;color:var(--txm)}
.d-sep{width:3px;height:3px;background:var(--bdr2);border-radius:50%}
.ev-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--delta-l);color:var(--delta);border:1px solid var(--delta-b)}
.icd-code{font-family:var(--mono);font-weight:700;color:var(--acc);cursor:pointer;border-bottom:1px dashed var(--acc);font-size:11px;position:relative}
.icd-tooltip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:10;font-family:var(--fn);font-weight:400;pointer-events:none}
.icd-code:hover .icd-tooltip{display:block}
.drg-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:3px;background:var(--sur2);border:1px solid var(--bdr);cursor:help}
.d-coding-note{padding:5px 0 10px;font-size:10px;color:var(--txs);border-top:1px dashed var(--bdr);margin-top:4px}

/* ─── STEP SECTIONS ─── */
.step-section{padding:22px 28px;border-bottom:1px solid var(--bdr);background:var(--sur)}
.step-section:last-child{border-bottom:none}
.step-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.step-n{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--txs);background:var(--sur2);border:1px solid var(--bdr);padding:3px 7px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.step-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.step-sub{font-size:11px;color:var(--txm);margin-left:auto;font-style:italic;flex-shrink:0}
.sline{flex:1;height:1px;background:var(--bdr);margin-left:6px}

/* ─── INLINE CITATION BADGE ─── */
.cite{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid;cursor:pointer;font-family:var(--fn);vertical-align:middle;margin-left:3px;white-space:nowrap;transition:opacity .1s}
.cite:hover{opacity:.75}
.cite-A{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.cite-B{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.cite-C{background:var(--sur2);color:var(--txm);border-color:var(--bdr)}
.cite-meta{font-size:8px;opacity:.75;font-weight:400}

/* ─── SYMPTOMS TABLE ─── */
.sym-tbl{width:100%;border-collapse:collapse;background:var(--sur);border-radius:8px;overflow:hidden;border:1px solid var(--bdr)}
.sym-tbl thead tr{background:var(--sur2)}
.sym-tbl th{padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txm);text-align:left;border-bottom:1px solid var(--bdr)}
.sym-tbl td{padding:5px 8px;border-bottom:1px solid var(--sur2);vertical-align:middle;font-size:12px}
.sym-tbl tr:last-child td{border-bottom:none}
.sym-tbl tr.sym-row:hover td{background:var(--sur2)}
.sym-tbl tr.sym-note-row td{border-bottom:1px solid var(--sur2)}
.sym-name-cell{font-weight:600;color:var(--tx)}
.sym-cat-pill{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--sur2);border:1px solid var(--bdr);color:var(--txm);display:inline-block;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.stat-pill{display:inline-block;font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 6px;border-radius:4px;border:1px solid;min-width:38px;text-align:center}
.sp-hi{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.sp-md{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.sp-lo{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.sp-na{background:var(--sur2);color:var(--txs);border-color:var(--bdr)}
.sym-note-cell{font-size:11px;color:var(--txm);line-height:1.4}
.leg{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--txs);margin-top:7px;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px}

/* ─── RISK / SCORES ─── */
.risk-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.criteria-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.criteria-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.criteria-name{font-size:13px;font-weight:700}
.criteria-src{font-size:11px;color:var(--txm);margin-top:1px}
.criteria-bd{padding:12px 14px}
.crit-grp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;margin-top:8px}
.crit-grp-lbl:first-child{margin-top:0}
.crit-grp-lbl.red{color:var(--red)}.crit-grp-lbl.amb{color:var(--amb)}
.crit-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--sur2);font-size:12px;color:var(--tx)}
.crit-item:last-child{border-bottom:none}
.crit-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.crit-dot.red{background:var(--red-b)}.crit-dot.amb{background:var(--amb-b)}
.crit-trigger{margin-top:8px;padding:7px 10px;background:var(--red-l);border-radius:5px;border:1px solid var(--red-b);font-size:11px;color:var(--red);font-weight:600;line-height:1.4}
.crit-dx{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--sur2)}
.crit-dx:last-child{border-bottom:none}
.crit-dx-cb{accent-color:var(--acc);margin-top:2px;cursor:pointer}
.crit-dx-lbl{font-size:12px;line-height:1.5;cursor:pointer;flex:1}
.req-tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8;margin-left:5px;vertical-align:middle}
.dx-result{margin-top:10px;padding:8px 11px;border-radius:6px;font-size:12px;font-weight:600;display:none}
.dx-result.show{display:block}
.dx-result.met{background:var(--grn-l);border:1px solid var(--grn-b);color:var(--grn)}
.dx-result.partial{background:var(--amb-l);border:1px solid var(--amb-b);color:var(--amb)}
.dx-result.notmet{background:var(--red-l);border:1px solid var(--red-b);color:var(--red)}
.dx-note{font-size:11px;color:var(--txm);padding:7px 9px;background:var(--sur2);border-radius:5px;border:1px solid var(--bdr);margin-top:7px;line-height:1.5}
.score-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.score-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.score-name{font-size:13px;font-weight:700}.score-desc{font-size:11px;color:var(--txm);margin-top:1px}
.score-body{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.score-var{margin-bottom:8px}
.score-var-lbl{font-size:11px;color:var(--txm);margin-bottom:3px}
.score-sel{width:100%;padding:5px 8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:12px;font-family:var(--fn);outline:none;cursor:pointer}
.score-sel:focus{border-color:var(--acc)}
.score-result{padding:10px 12px;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr)}
.score-big{font-size:32px;font-weight:700;font-family:var(--mono);color:var(--acc);line-height:1;margin-bottom:6px}
.score-row{padding:5px 8px;border-radius:4px;font-size:11px;margin-bottom:2px;border:1px solid transparent;opacity:.35;line-height:1.4}
.score-row.active{opacity:1;font-weight:600}
.s-lo{background:var(--grn-l);border-color:var(--grn-b);color:var(--grn)}
.s-md{background:var(--amb-l);border-color:var(--amb-b);color:var(--amb)}
.s-hi{background:var(--red-l);border-color:var(--red-b);color:var(--red)}

/* ─── WORKUP ─── */
.wk-tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.wk-tab{padding:7px 14px;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.wk-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.wk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--sur2)}
.wk-row:last-child{border-bottom:none}
.wk-cb{accent-color:var(--acc);margin-top:3px;flex-shrink:0;cursor:pointer}
.wk-body{flex:1}
.wk-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.wk-why{font-size:11px;color:var(--txm);line-height:1.4;margin-top:2px}
.wk-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.wt-routine{background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8}
.wt-selective{background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b)}
.wt-severe{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.wk-stats{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.wk-stat{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;background:var(--sur2);border:1px solid var(--bdr);color:var(--txm)}
.wk-stat span{color:var(--tx);font-weight:600}

/* ─── TREATMENT ─── */
.tx-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tx-tab{padding:6px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;font-family:var(--fn)}
.tx-tab.active{background:var(--acc);border-color:var(--acc);color:#fff}
.tx-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;margin-bottom:12px;overflow:hidden}
.tx-hd{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.tx-name{font-size:14px;font-weight:700}.tx-class{font-size:11px;color:var(--txm);margin-top:1px}
.tx-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.ttag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;border:1px solid}
.ttag-1l{background:var(--acc-l);color:var(--acc);border-color:#C3D5E8}
.ttag-pref{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.ttag-alt{background:var(--sur2);color:var(--txm);border-color:var(--bdr)}
.tx-bd{padding:14px}

/* ─── CITED TABLE ─── */
.cited-tbl{width:100%;border-collapse:collapse;margin-bottom:10px}
.cited-tbl td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--sur2);vertical-align:top}
.cited-tbl tr:last-child td{border-bottom:none}
.cited-lbl{color:var(--txm);width:28%;font-size:11px;padding-top:8px;font-weight:600}
.cited-val{color:var(--acc);font-family:var(--mono);font-size:12px;font-weight:500}
.cited-note{font-size:11px;color:var(--txm);font-family:var(--fn);margin-top:2px}
.pk-strip{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--txm);background:var(--sur2);padding:7px 10px;border-radius:5px;margin-bottom:10px;border:1px solid var(--bdr)}
.pk-item strong{color:var(--tx)}
.tx-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tx-col{background:var(--sur2);border-radius:6px;padding:9px 11px;border:1px solid var(--bdr)}
.tx-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.tx-col-title.red{color:var(--red)}.tx-col-title.amb{color:var(--amb)}.tx-col-title.blue{color:var(--acc)}.tx-col-title.grn{color:var(--grn)}
.tx-li{font-size:11px;color:var(--txm);padding:3px 0;border-bottom:1px solid var(--bdr);line-height:1.5;display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap}
.tx-li:last-child{border-bottom:none}
.tx-li-txt{flex:1}
.ev-section{border-top:1px solid var(--bdr);padding-top:10px;margin-top:8px}
.ev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txs);margin-bottom:6px}
.ev-row{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--sur2);flex-wrap:wrap}
.ev-row:last-child{border-bottom:none}
.ev-trial-btn{font-size:11px;font-weight:600;padding:3px 8px;background:var(--acc-l);border:1px solid #C3D5E8;border-radius:4px;color:var(--acc);cursor:pointer;font-family:var(--fn);flex-shrink:0}
.ev-trial-btn:hover{background:#DDE8F2}
.ev-grade{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;font-family:var(--mono);flex-shrink:0}
.ev-A{background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b)}
.ev-B{background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b)}
.ev-C{background:var(--sur2);color:var(--txm);border:1px solid var(--bdr)}
.ev-key{font-size:11px;color:var(--tx);background:var(--acc-l);padding:3px 8px;border-radius:3px;margin-top:2px;width:100%;line-height:1.4;border:1px solid #C3D5E8}
.apply-yes{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b);flex-shrink:0}
.apply-no{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--sur2);color:var(--txs);border:1px solid var(--bdr);flex-shrink:0}
.apply-unk{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b);flex-shrink:0}

/* ─── DELTA VIEW ─── */
.delta-block{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;margin-top:18px;overflow:hidden}
.delta-hd{padding:11px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;background:var(--sur2)}
.delta-hd-title{font-size:13px;font-weight:700;color:var(--tx)}
.delta-new-pill{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--acc);color:#fff;letter-spacing:.3px}
.delta-intro{font-size:12px;color:var(--txm);padding:10px 14px;line-height:1.5;border-bottom:1px solid var(--bdr)}
.delta-wrap{overflow-x:auto}
.delta-tbl{width:100%;border-collapse:collapse;min-width:700px}
.delta-tbl th{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txs);text-align:left;background:var(--sur2);border-bottom:1px solid var(--bdr)}
.delta-tbl td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--sur2);vertical-align:top;line-height:1.5}
.delta-tbl tr:last-child td{border-bottom:none}
.delta-tbl tr:hover td{background:var(--sur2)}
.delta-topic{font-weight:600;color:var(--tx);font-size:12px}
.delta-gl{color:var(--txm);font-size:12px}
.rel-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid;margin-bottom:4px}
.rp-sup{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.rp-conf{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.rp-nuance{background:#FAFAEB;color:#3A3A0A;border-color:#C4B800}
.rp-early{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.act-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-top:4px;background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8}
.act-tag.chg{background:#EBF7F0;color:var(--grn);border-color:var(--grn-b)}
.act-tag.hold{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.delta-study-btn{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;background:var(--acc-l);border:1px solid #C3D5E8;border-radius:3px;color:var(--acc);cursor:pointer;font-family:var(--fn);white-space:nowrap;margin:1px 2px 1px 0}
.delta-study-btn:hover{background:#DDE8F2}

/* ─── SPECIAL SITUATIONS ─── */
.acc-item{border:1px solid var(--bdr);border-radius:7px;margin-bottom:6px;overflow:hidden;background:var(--sur)}
.acc-trigger{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;justify-content:space-between;user-select:none}
.acc-trigger:hover{background:var(--sur2)}
.acc-arrow{font-size:10px;color:var(--txm);transition:transform .2s}
.acc-item.open .acc-arrow{transform:rotate(90deg)}
.acc-body{display:none;padding:12px 14px;border-top:1px solid var(--bdr);font-size:12px;line-height:1.7;color:var(--txm)}
.acc-item.open .acc-body{display:block}

/* ─── FOLLOW UP ─── */
.fu-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--sur2);font-size:12px;color:var(--tx)}
.fu-item:last-child{border-bottom:none}
.fu-n{width:22px;height:22px;border-radius:50%;background:var(--acc-l);border:1.5px solid var(--acc-m);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.fu-content{flex:1;line-height:1.5}

/* ─── MODAL ─── */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(18,12,6,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.14)}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--sur);z-index:1}
.modal-title{font-size:14px;font-weight:700;line-height:1.3}
.modal-x{background:transparent;border:none;color:var(--txm);font-size:20px;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.modal-bd{padding:16px 18px}
.m-r{display:flex;gap:8px;margin-bottom:9px;font-size:12px}
.m-l{color:var(--txm);min-width:110px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;padding-top:2px}
.m-v{color:var(--tx);line-height:1.5;flex:1}
.m-div{height:1px;background:var(--bdr);margin:10px 0}
.m-key{padding:9px 11px;background:var(--acc-l);border-radius:6px;border:1px solid #C3D5E8;font-size:12px;color:var(--acc);line-height:1.5;font-weight:500;margin-top:7px}
.pt-apply{padding:9px 11px;border-radius:6px;border:1px solid;margin-top:8px;font-size:12px;line-height:1.5}
.pa-yes{background:var(--grn-l);border-color:var(--grn-b);color:var(--grn)}
.pa-no{background:var(--red-l);border-color:var(--red-b);color:var(--red)}
.pa-unk{background:var(--amb-l);border-color:var(--amb-b);color:var(--amb)}
.form-r{margin-bottom:9px}
.form-lbl{font-size:10px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;display:block}
.form-inp{width:100%;padding:7px 9px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:13px;font-family:var(--fn);outline:none}
.form-inp:focus{border-color:var(--acc)}
.form-sel{width:100%;padding:7px 9px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:13px;font-family:var(--fn);outline:none;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:3px}
.cmb-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.cmb-item input{accent-color:var(--acc);cursor:pointer}
.save-btn{width:100%;padding:9px;background:var(--acc);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);margin-top:9px}
.save-btn:hover{opacity:.88}

/* ─── HOME ─── */
.home{min-height:100vh}
.home-nav{height:50px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 22px;gap:14px}
.home-body{max-width:900px;margin:0 auto;padding:40px 22px}
.home-hl{font-family:var(--serif);font-size:34px;letter-spacing:-.5px;margin-bottom:6px;line-height:1.2}
.home-sub{font-size:14px;color:var(--txm);margin-bottom:26px;line-height:1.6;max-width:560px}
.srch-wrap{display:flex;margin-bottom:28px;box-shadow:0 2px 10px rgba(27,58,92,.07)}
.srch-inp{flex:1;padding:12px 15px;border:1.5px solid var(--bdr2);border-right:none;border-radius:7px 0 0 7px;font-size:14px;font-family:var(--fn);color:var(--tx);background:var(--sur);outline:none}
.srch-inp:focus{border-color:var(--acc)}
.srch-inp::placeholder{color:var(--txs)}
.srch-btn{padding:12px 18px;background:var(--acc);color:#fff;border:none;border-radius:0 7px 7px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn)}
.ex-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:-18px;margin-bottom:26px}
.ex-chip{font-size:12px;padding:4px 10px;background:var(--sur);border:1px solid var(--bdr);border-radius:20px;color:var(--txm);cursor:pointer}
.ex-chip:hover{border-color:var(--acc);color:var(--acc)}
.ex-chip.disabled{opacity:.5;cursor:default}.ex-chip.disabled:hover{border-color:var(--bdr);color:var(--txm)}
.d-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:28px}
.d-card{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:14px 16px;cursor:pointer;transition:all .13s}
.d-card:hover{border-color:var(--acc);box-shadow:0 4px 14px rgba(27,58,92,.1)}
.d-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.d-card-name{font-size:14px;font-weight:700;color:var(--tx);line-height:1.3}
.d-card-cat{font-size:10px;color:var(--txm);margin-top:2px}
.d-upd{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px}
.d-upd.new{background:var(--delta-l);color:var(--delta);border:1px solid var(--delta-b)}
.d-upd.ok{background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b)}
.d-sum{font-size:12px;color:var(--txm);line-height:1.5;margin-bottom:9px}
.d-foot{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txs)}
.home-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--txs);margin-bottom:11px}

/* ─── MOBILE ─── */
@media(max-width:680px){
  /* Shell + topbar */
  html,body{font-size:13px}
  .shell{height:100dvh}
  .topbar{padding:0 12px;gap:8px}
  .bc{display:none}
  .tbtn{padding:4px 8px;font-size:11px}

  /* Content padding */
  .content{-webkit-overflow-scrolling:touch}
  .d-hdr{padding:14px 14px 0}
  .d-title{font-size:21px}
  .d-meta{gap:5px;font-size:10px}
  .d-coding-note{font-size:9px}
  .step-section{padding:16px 14px}
  .step-sub{display:none}
  .sline{display:none}

  /* Symptoms — stack as cards instead of wide table */
  .sym-tbl{display:none}
  .sym-mobile{display:flex;flex-direction:column;gap:8px}
  .sym-mob-row{background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px}
  .sym-mob-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
  .sym-mob-cat{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--txs);margin-bottom:6px}
  .sym-mob-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:7px}
  .sym-mob-stat{background:var(--sur2);border-radius:4px;padding:4px 6px;text-align:center}
  .sym-mob-stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.4px;color:var(--txs);display:block;margin-bottom:1px}
  .sym-mob-note{font-size:11px;color:var(--txm);line-height:1.4;border-top:1px solid var(--sur2);padding-top:6px}

  /* Risk layout */
  .risk-layout{grid-template-columns:1fr}
  .score-body{grid-template-columns:1fr}

  /* Workup */
  .wk-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .wk-tab{white-space:nowrap;flex-shrink:0}

  /* Treatment */
  .tx-tabs{gap:3px}
  .tx-tab{padding:5px 10px;font-size:11px}
  .tx-cols{grid-template-columns:1fr}
  .pk-strip{font-size:10px;gap:8px}
  .cited-lbl{display:none}

  /* Delta view */
  .delta-block{margin-top:14px}
  .delta-tbl{min-width:580px}

  /* Special / accordion */
  .acc-trigger{font-size:12px;padding:9px 12px}
  .acc-body{padding:10px 12px;font-size:11px}

  /* Modal — full screen sheet */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{width:100%;max-height:88dvh;border-radius:14px 14px 0 0;border-bottom:none}
  .modal-hd{padding:12px 16px}
  .modal-bd{padding:12px 16px}
  .form-grid{grid-template-columns:1fr}
  .cmb-grid{grid-template-columns:1fr}
  .m-l{min-width:80px;font-size:9px}

  /* Home page */
  .home-body{padding:24px 14px}
  .home-hl{font-size:26px}
  .home-sub{font-size:13px}
  .d-grid{grid-template-columns:1fr;gap:8px}
  .srch-wrap{margin-bottom:20px}
  .ex-chips{margin-top:-14px;margin-bottom:20px}

  /* Evidence feed cards */
  .ev-row{flex-direction:column;gap:5px}
  .tx-hd{padding:10px 12px}
  .tx-bd{padding:12px}
}
@media(min-width:681px){
  .sym-mobile{display:none}
}
</style>

  delta:[
    {topic:'SGLT2i in HFpEF',guideline:'Not recommended in 2013 ACC/AHA guidelines (pre-SGLT2i era)',glRef:'PARADIGM_HF2014',relationship:'conflict',evidence:'EMPEROR-Preserved (NEJM 2021, n=5988): empagliflozin reduces CV death + HF hospitalization by 21% in EF >40%. DELIVER (NEJM 2022, n=6263): dapagliflozin similar benefit in HFpEF/HFmrEF.',practical:'SGLT2i now recommended for HFpEF (EF >40%) — first therapy to show benefit in this population. Start empagliflozin 10mg or dapagliflozin 10mg in all HFpEF unless contraindicated.',action:'change',studies:['EMPEROR-Preserved 2021','DELIVER 2022'],studyRefs:['EMPEROR_Reduced2020','DAPA_HF2019']},

  special:[
    {label:'HFpEF (EF ≥50%) — different management',grade:'A',ref:'DAPA_HF2019',
    content:`<strong>HFpEF fundamentals:</strong> <span class="cite cite-A" onclick='openStudy("DAPA_HF2019")'>ACC/AHA 2022 · A</span><br>
    HFpEF is diagnosed when: EF ≥50% + elevated filling pressures (BNP/NT-proBNP or invasive) + HF symptoms. Represents ~50% of all HF.<br><br>
    <strong>What works:</strong><br>
    • SGLT2i (empagliflozin or dapagliflozin) — only class proven to reduce HF events in HFpEF (EMPEROR-Preserved, DELIVER)<br>
    • Aggressive BP control target <130/80 mmHg<br>
    • Rate control in AF<br>
    • Diuretics for symptom relief (congestion)<br>
    • Treat underlying causes: obesity, sleep apnea, AF, hypertension, diabetes<br><br>
    <strong>What does NOT work in HFpEF:</strong> ARNi showed no benefit in PARAGON-HF (p=0.06, borderline). ACEi/ARB — no proven mortality benefit.`},
    {label:'HFrEF with AF — anticoagulation + rate control',grade:'A',ref:'ARISTOTLE2011',
    content:`<strong>Anticoagulation:</strong> <span class="cite cite-A" onclick='openStudy("ARISTOTLE2011")'>ARISTOTLE · A</span><br>
    AF + HF: CHA₂DS₂-VASc score ≥2 (men) or ≥3 (women) → anticoagulate. DOAC preferred over warfarin (ARISTOTLE, RE-LY).<br>
    Apixaban preferred in HF — best bleeding profile. Avoid dabigatran if eGFR <30.<br><br>
    <strong>Rate control target:</strong> Resting HR 60–100 bpm (lenient target is acceptable — RACE II). Use metoprolol succinate or carvedilol (beta-blockers preferred in HFrEF). Avoid non-DHP calcium channel blockers (diltiazem/verapamil) in HFrEF — negative inotropes.<br><br>
    <strong>Rhythm control:</strong> Consider if symptomatic despite rate control. Catheter ablation may improve EF in AF + HFrEF (CASTLE-AF trial).`},
    {label:'Device therapy — ICD and CRT',grade:'A',ref:'PARADIGM_HF2014',
    content:`<strong>ICD indications in HFrEF:</strong> <span class="cite cite-A" onclick='openStudy("PARADIGM_HF2014")'>ACC/AHA 2022 · A</span><br>
    EF ≤35% after ≥3 months of optimized GDMT + NYHA II–III + life expectancy >1 year → ICD for primary prevention SCD.<br>
    Do NOT place ICD in newly diagnosed HFrEF — wait 3 months of GDMT (EF often improves significantly).<br><br>
    <strong>CRT indications:</strong> EF ≤35% + LBBB + QRS ≥150ms (or QRS 120–149ms with LBBB) + NYHA II-IV on GDMT → CRT-D. Reduces mortality and improves EF.<br>
    Non-LBBB pattern: benefit less certain — shared decision-making.`},
    {label:'Cardiorenal syndrome — managing AKI during diuresis',grade:'B',ref:'PARADIGM_HF2014',
    content:`<strong>Cr rise during diuresis:</strong> <span class="cite cite-A" onclick='openStudy("PARADIGM_HF2014")'>ACC/AHA 2022</span><br>
    Mild Cr elevation (≤0.3–0.5 mg/dL) during aggressive diuresis is acceptable if clinical decongestion is achieved — do NOT stop diuresis for a small Cr bump.<br><br>
    <strong>CARRESS-HF key point:</strong> Stepped pharmacologic diuresis was superior to ultrafiltration in ADHF-AKI. Aggressive diuresis improved outcomes despite Cr rise.<br><br>
    <strong>When to reduce diuresis:</strong> Cr rise >0.5 mg/dL AND signs of prerenal azotemia (BUN/Cr ratio >20, low UO <30 mL/hr despite diuretics) — reduce furosemide, hold ACEi/ARB temporarily, assess volume status carefully.`},
    {label:'Decompensation precipitants — always identify',grade:'A',ref:'PARADIGM_HF2014',
    content:`<strong>Always identify and treat the precipitant:</strong> <span class="cite cite-A" onclick='openStudy("PARADIGM_HF2014")'>ACC/AHA 2022 · A</span><br>
    Most common precipitants (FAILURE mnemonic):<br>
    • <strong>F</strong>orgot medications / medication non-adherence<br>
    • <strong>A</strong>rrhythmia (new AF, VT)<br>
    • <strong>I</strong>schemia / infarction (ACS)<br>
    • <strong>L</strong>ifestyle (dietary indiscretion — high sodium/fluid intake)<br>

special:[
{
label:'The AKI differential — prerenal, intrinsic, postrenal',grade:'A',ref:'KDIGO_AKI2012_FULL',
content:`<strong>Every AKI must be classified: prerenal (60%), intrinsic (35%), or postrenal (5%).</strong> <span class="cite cite-A" onclick='openStudy("KDIGO_AKI2012_FULL")'>KDIGO 2012 · A</span><br><br> <strong>PRERENAL (most common — 60%):</strong><br> • Volume depletion (hemorrhage, dehydration, GI losses)<br> • Low effective circulating volume (HF, cirrhosis, sepsis)<br> • FENa <1%, FEUrea <35%, BUN/Cr >20, urine Na <20<br> • Bland urine sediment. Responds to volume within 24-48h.<br><br> <strong>INTRINSIC (35%):</strong><br> • ATN: most common. Muddy brown granular casts. FENa >2%. From ischemia or toxins.<br> • AIN: drug-induced (NSAIDs, PPIs, antibiotics). WBC casts, eosinophils. Steroids may help.<br> • GN: RBC casts (pathognomonic), proteinuria, hematuria. URGENT biopsy. Treat cause.<br> • Vascular: TMA, renal vein thrombosis, cholesterol emboli (livedo, eosinophilia, post-cath).<br><br> <strong>POSTRENAL (5%):</strong><br> • Hydronephrosis on US = obstruction until proven otherwise<br> • BPH (most common in men), stones, tumor, blood clots<br> • Must be BILATERAL obstruction (or obstruction of solitary kidney) to cause AKI<br> • Bladder scan: post-void residual >200mL → Foley catheter → if UO improves → obstruction confirmed`
},
{
label:'Urine sediment — the renal biopsy of the bedside',grade:'A',ref:'KDIGO_AKI2012_FULL',
content:`<strong>EVERY AKI needs urine microscopy. The sediment tells you the diagnosis.</strong><br><br> <strong>Muddy brown granular casts</strong> = ATN (acute tubular necrosis)<br> → Most common intrinsic AKI. From ischemia or nephrotoxins. Supportive care. Recovery 7-21 days.<br><br> <strong>RBC casts</strong> = Glomerulonephritis (GN)<br> → URGENT — GN can cause RPGN (creatinine doubling in weeks). Needs immediate nephrology consult and likely biopsy. Differential: IgA, lupus, ANCA vasculitis, anti-GBM, post-infectious.<br><br> <strong>WBC casts</strong> = AIN (acute interstitial nephritis) or pyelonephritis<br> → Drug-induced AIN: stop offending drug, consider steroids. Eosinophiluria supports AIN.<br><br> <strong>Bland sediment</strong> (no casts) = Prerenal or postrenal<br> → Check FENa, renal US for hydronephrosis.<br><br> <strong>Crystals:</strong> Uric acid (tumor lysis), calcium oxalate (ethylene glycol poisoning), drug crystals (acyclovir, methotrexate, sulfadiazine).`
},
{
label:'When to call nephrology — and what they need from you',grade:'A',ref:'KDIGO_AKI2012_FULL',
content:`<strong>Nephrology consult indications in AKI:</strong><br><br> • KDIGO Stage 2-3 AKI (Cr ≥2× baseline or approaching need for RRT)<br> • Suspected GN (RBC casts, significant proteinuria, systemic disease)<br> • Hyperkalemia refractory to medical management<br> • Metabolic acidosis pH <7.1 not responding to bicarbonate<br> • Need for RRT decision<br> • AKI of unclear etiology after standard workup<br> • Post-transplant AKI (always — transplant nephrology)<br><br> <strong>What to have ready before calling:</strong><br> 1. Baseline Cr (from last 3-6 months if available)<br> 2. Cr trend over last 48-72h<br> 3. UO last 6-12h<br> 4. Urine sediment results (muddy brown casts? RBC casts?)<br> 5. FENa and/or FEUrea<br> 6. Renal US result (hydronephrosis?)<br> 7. Medication list (nephrotoxins identified?)<br> 8. Volume status assessment (hypovolemic, euvolemic, or overloaded?)<br> 9. K⁺ and last ECG if hyperkalemic`
},
{
label:'Contrast-associated AKI — what we got wrong',grade:'A',ref:'CONTRAST_AKI_2019',
content:`<strong>NAC does not work. NaHCO₃ is not superior to NS. Pre-hydration may not even be necessary for eGFR 30-59.</strong> <span class="cite cite-A" onclick='openStudy("CONTRAST_AKI_2019")'>PRESERVE · A</span><br><br> <strong>What PRESERVE showed (NEJM 2018, n=5177):</strong><br> • IV NaHCO₃ vs IV NaCl: no difference in contrast AKI prevention<br> • NAC vs placebo: no difference. NAC also falsely lowers Cr (assay interference)<br><br> <strong>What AMACING showed (Lancet 2017):</strong><br> • Pre-hydration vs no pre-hydration for eGFR 30-59: no difference in contrast AKI<br> • Pre-hydration caused volume overload in some patients<br><br> <strong>What actually prevents contrast AKI:</strong><br> 1. <strong>Minimize contrast volume</strong> (<3× eGFR mL) — strongest modifiable factor<br> 2. Iso-osmolar or low-osmolar contrast<br> 3. Avoid repeat contrast within 48h<br> 4. Hold metformin if eGFR <30 (lactic acidosis risk if AKI develops)<br> 5. Isotonic saline pre-hydration reasonable for eGFR <30 (weak evidence)<br><br> <strong>Stop ordering NAC.</strong> It does not work and gives false reassurance.`
},
{
label:'Cardiorenal syndrome — do NOT give fluids to HF + AKI',grade:'A',ref:'KDIGO_AKI2012_FULL',
content:`<strong>In HF + AKI, the kidneys are failing from VENOUS CONGESTION, not hypovolemia.</strong><br><br> <strong>Mechanism:</strong> Elevated CVP from volume overload → transmitted to renal veins → reduces transrenal perfusion gradient → AKI. Giving more fluids WORSENS this.<br><br> <strong>Treatment: DIURESIS, not fluids.</strong><br> • IV furosemide (dose = home oral dose as IV, or 2.5× for aggressive decongestion)<br> • Add metolazone 2.5-5mg PO 30 min before furosemide if resistant<br> • Tolerate Cr rise ≤0.3-0.5 mg/dL during active decongestion — this is acceptable<br> • CARRESS-HF: stepped pharmacologic diuresis superior to ultrafiltration<br><br> <strong>How to tell cardiorenal from prerenal:</strong><br> • JVD, peripheral edema, elevated BNP = volume overloaded → diurese<br> • Dry mucous membranes, orthostatic hypotension, flat JVP = hypovolemic → fluids<br> • IVC on POCUS: distended + non-collapsible = overloaded → diurese<br><br> <strong>Common error:</strong> Giving IVF to a patient with HF + AKI because "the creatinine is rising" — this worsens both HF and AKI.`
},
{
label:'Rhabdomyolysis-induced AKI — aggressive hydration',grade:'B',ref:'KDIGO_AKI2012_FULL',
content:`<strong>CK >5000 = rhabdomyolysis at risk for AKI. CK >10,000 = high risk.</strong><br><br> <strong>Mechanism:</strong> Myoglobin released from damaged muscle → filtered by kidney → precipitates in tubules (especially in acidic urine) → ATN. Also: direct tubular toxicity, renal vasoconstriction, and free radical generation.<br><br> <strong>Prevention:</strong><br> • Aggressive IV LR at 200-300 mL/hr (higher than standard AKI resuscitation) — target UO >200-300 mL/hr<br> • Goal: prevent myoglobin precipitation by maintaining high urine flow<br> • Duration: until CK trending down and Cr stable<br><br> <strong>IV bicarbonate (controversial):</strong><br> • Alkalinizing urine (pH >6.5) prevents myoglobin precipitation in theory<br> • Limited RCT evidence. Some guidelines suggest NaHCO₃ 150mEq in 1L D5W at 200 mL/hr<br> • Risk: metabolic alkalosis, hypocalcemia (Ca-bicarb complex)<br> • If used: target urine pH >6.5<br><br> <strong>Monitor:</strong> CK q12h (peak at 24-72h), Cr daily, K⁺ q6h (rhabdo causes severe hyperkalemia from muscle breakdown), calcium (hypocalcemia early → hypercalcemia during recovery), phosphate (elevated from muscle release).`
},
],

special:[
{
label:'Timeline of alcohol withdrawal — know what\'s coming',grade:'A',ref:'DT_MORTALITY',
content:`<strong>Withdrawal follows a predictable timeline after last drink:</strong> <span class="cite cite-A" onclick='openStudy("DT_MORTALITY")'>Schuckit, NEJM 2014 · A</span><br><br> <strong>6-12 hours:</strong> Tremor, anxiety, nausea, insomnia, tachycardia, hypertension. CIWA monitoring begins.<br><br> <strong>12-24 hours:</strong> Alcoholic hallucinosis — visual/auditory/tactile hallucinations WITH intact sensorium (patient knows they're hallucinating). Distinct from DTs.<br><br> <strong>12-48 hours:</strong> Withdrawal seizures — generalized tonic-clonic. Peak at 24h. Usually brief, self-limited. Prior seizures predict recurrence.<br><br> <strong>48-96 hours (up to 7 days):</strong> Delirium tremens — the most dangerous phase. Delirium + autonomic storm + agitation. Mortality 1-5% treated, 15-35% untreated. Peak at 72h.<br><br> <strong>Key insight:</strong> Patients can worsen DAYS after admission. Do not assume a patient doing well on day 1 is out of danger. Continue CIWA monitoring for minimum 72h, ideally 96h after last drink.`
},
{
label:'DTs — recognition and aggressive management',grade:'A',ref:'DT_MORTALITY',
content:`<strong>DTs kill. Undertreated DTs kill more. Aggressive benzo dosing saves lives.</strong><br><br> <strong>How to recognize DTs (vs simple withdrawal):</strong><br> • DELIRIUM: fluctuating confusion, disorientation to time/place/person, inattention<br> • AUTONOMIC STORM: HR >120, SBP >180, fever >38.5°C, profuse diaphoresis<br> • AGITATION: severe psychomotor agitation, combativeness<br> • All 3 together = DTs. Simple withdrawal has autonomic signs but CLEAR sensorium.<br><br> <strong>Treatment protocol:</strong><br> 1. Diazepam 10-20mg IV q5-15min until calm but arousable<br> 2. If requiring >100mg diazepam → add phenobarbital 130-260mg IV q30min<br> 3. If still refractory → dexmedetomidine infusion (ICU only)<br> 4. If unable to protect airway → intubate + propofol or midazolam infusion<br><br> <strong>Do NOT underdose.</strong> Some patients need 200-400mg diazepam in the first 24h. This is normal for severe DTs. The risk of under-dosing (death) far exceeds the risk of over-dosing (respiratory depression, which is treatable).`
},
{
label:'Thiamine BEFORE glucose — the most important treatment sequence',grade:'A',ref:'THIAMINE_WERNICKE',
content:`<strong>ALWAYS give thiamine before glucose in any patient with possible AUD.</strong> <span class="cite cite-A" onclick='openStudy("THIAMINE_WERNICKE")'>Thomson 2006 + ASAM 2020 · A</span><br><br> <strong>Why:</strong> Glucose metabolism requires thiamine as a cofactor. Giving glucose to a thiamine-depleted patient diverts remaining thiamine stores to glucose metabolism → acutely worsens Wernicke encephalopathy → can cause IRREVERSIBLE Korsakoff syndrome.<br><br> <strong>Wernicke triad (only 16% have all 3):</strong><br> • Confusion / altered mental status (82%)<br> • Oculomotor dysfunction — nystagmus, lateral gaze palsy (29%)<br> • Gait ataxia (23%)<br><br> <strong>Protocol:</strong><br> • Thiamine 500mg IV over 30 min FIRST<br> • THEN glucose / dextrose / feeding<br> • Continue thiamine 500mg IV TID × 2-3 days<br> • Transition to thiamine 100mg PO TID for discharge<br><br> <strong>Do NOT skip IV dosing:</strong> Oral thiamine is poorly absorbed in AUD (impaired GI absorption + alcohol inhibits thiamine transporter). Only IV provides adequate levels acutely.`
},
{
label:'The "banana bag" is inadequate — what to actually give',grade:'B',ref:'THIAMINE_WERNICKE',
content:`<strong>The classic "banana bag" (MVI + folate + thiamine 100mg in NS) is INADEQUATE.</strong><br><br> <strong>What a banana bag contains:</strong><br> • Thiamine 100mg — insufficient (need 500mg TID for at-risk patients)<br> • Folate 1mg — appropriate<br> • Multivitamin — appropriate<br> • In 1L NS — appropriate for hydration<br><br> <strong>What you should actually order:</strong><br> • Thiamine 500mg IV TID × 3 days (not 100mg × 1)<br> • Folate 1mg IV/PO daily<br> • Magnesium sulfate 2g IV (repletes the almost-universal Mg deficiency in AUD; also raises seizure threshold)<br> • Potassium repletion to K⁺ >4.0<br> • Phosphorus repletion (especially with refeeding)<br> • NS or LR for hydration<br><br> <strong>The banana bag gives a false sense of security.</strong> Order the components separately at appropriate doses.`
},
{
label:'Medications for AUD — offer BEFORE discharge',grade:'A',ref:'ASAM_AW2020',
content:`<strong>Relapse prevention medications should be offered to every patient with AUD — including during the index hospitalization.</strong><br><br> <strong>Naltrexone (most commonly used):</strong><br> • 50mg PO daily. Reduces craving and heavy drinking days by 17-25%.<br> • CONTRAINDICATED in active opioid use or hepatic failure (LFTs >3-5× ULN)<br> • Can start during hospitalization after withdrawal resolves<br> • Monthly injection (Vivitrol 380mg IM) eliminates adherence issue<br><br> <strong>Acamprosate:</strong><br> • 666mg PO TID. Maintains abstinence, reduces relapse.<br> • Safe in liver disease (renally cleared). Dose-reduce for CrCl <30.<br> • First-line if liver disease precludes naltrexone<br><br> <strong>Gabapentin (600mg TID):</strong><br> • Anton 2020: effective for heavy drinking reduction<br> • Also treats anxiety, insomnia, and craving<br> • Safe in liver disease. Abuse potential — use with caution.<br><br> <strong>Disulfiram (250mg daily):</strong><br> • Aversion therapy — causes violent reaction with alcohol<br> • Requires highly motivated patient. Hepatotoxicity risk.<br> • Rarely used first-line but effective in supervised settings.`
},
],

workup:{
outpatient:[
{cat:'Imaging',name:'Chest X-ray (PA + lateral)',tag:'routine',ref:'GOLD2024',glRef:'GOLD2024',why:'Rule out pneumonia (consolidation → add antibiotics), pneumothorax (especially in emphysema), pleural effusion, and pulmonary edema (HF mimics AECOPD). CXR changes management in ~20% of AECOPD presentations.'},
{cat:'Laboratory',name:'ABG or VBG',tag:'routine',ref:'GOLD2024',glRef:'GOLD2024',why:'Essential in moderate-severe AECOPD. pH + PaCO2 determines need for NIV (pH 7.25-7.35 + PaCO2 >45 → start BiPAP) or intubation (pH <7.25). VBG pH is within 0.03-0.05 of ABG — acceptable for trend monitoring. ABG if O2 assessment needed.'},
{cat:'Laboratory',name:'CBC with differential',tag:'routine',ref:'GOLD2024',glRef:'GOLD2024',why:'WBC for infection severity. Eosinophils: eosinophilia suggests asthma-COPD overlap or eosinophilic exacerbation (steroids more likely to help). Eosinopenia (<0.05) is a DECAF criterion and poor prognostic marker. Hemoglobin — polycythemia from chronic hypoxemia.'},
{cat:'Laboratory',name:'BMP',tag:'routine',ref:'GOLD2024',glRef:'GOLD2024',why:'Renal function for medication dosing. Electrolytes — beta-agonists cause hypokalemia. CO2 on BMP as surrogate for chronic hypercapnia (elevated bicarbonate = metabolic compensation for chronic respiratory acidosis).'},
{cat:'Imaging',name:'ECG',tag:'routine',ref:'GOLD2024',why:'New AF with RVR (common during AECOPD — 10-15%). Multifocal atrial tachycardia (MAT — pathognomonic of severe COPD). Right axis deviation, P-pulmonale (cor pulmonale). Rule out MI as AECOPD trigger.'},
{cat:'Laboratory',name:'Sputum culture (if purulent and recurrent exacerbator)',tag:'selective',ref:'GOLD2024',why:'Not routine for first exacerbation. Obtain if: (1) frequent exacerbations despite therapy, (2) prior Pseudomonas isolation, (3) structural lung disease (bronchiectasis overlap), (4) failure of initial antibiotic. Guides targeted antibiotic therapy.'},
{cat:'Biomarkers',name:'Procalcitonin',tag:'selective',ref:'ProHOSP2010',why:'PCT-guided antibiotic decisions in AECOPD: PCT <0.1 ng/mL → withhold antibiotics (mostly viral). PCT >0.25 → antibiotics indicated. Reduces antibiotic use by 30-40% without worse outcomes (ProHOSP, Lancet 2010). Not universally available.'},
{cat:'Laboratory',name:'BNP or NT-proBNP',tag:'selective',ref:'GOLD2024',why:'If HF suspected as co-trigger or mimic. Dyspnea + peripheral edema + elevated BNP → concurrent HF decompensation. COPD and HF frequently co-exist (20-30% overlap). May change management (add diuretics).'},
{cat:'Imaging',name:'CT chest (CTA if PE suspected)',tag:'selective',ref:'GOLD2024',why:'CTA if PE suspected (AECOPD not improving, pleuritic pain, DVT risk factors, D-dimer elevated). PE is found in 3-25% of unexplained AECOPD. CT also identifies bronchiectasis, lung cancer, and emphysema distribution (for surgical planning).'},
],
inpatient:[
{cat:'Laboratory',name:'All outpatient labs above — apply at admission',tag:'routine',ref:'GOLD2024',glRef:'GOLD2024',why:'Same priorities. Add serial ABG/VBG q2-4h if on NIV to guide ventilator settings.'},
{cat:'Laboratory',name:'Serial ABG or VBG q2-4h (if on NIV)',tag:'routine',ref:'AECOPD_NIV_RAM2004',why:'Guides NIV settings (IPAP/EPAP titration). Target: pH >7.35, PaCO2 reduction 15-20% from baseline. If pH not improving within 1-2h → consider intubation. After NIV success, space to q8-12h then discontinue when stable.'},
{cat:'Laboratory',name:'Blood eosinophils',tag:'routine',ref:'GOLD2024',why:'GOLD 2024: blood eosinophils guide ICS decision for long-term management. ≥300 = ICS indicated. <100 = avoid ICS (pneumonia risk without benefit). Obtain during admission for discharge therapy planning. Also DECAF criterion (eosinopenia).'},
{cat:'Imaging',name:'Spirometry (post-recovery, before discharge if new diagnosis)',tag:'selective',ref:'GOLD2024',why:'Not during acute exacerbation (inaccurate). Perform at 4-6 weeks post-recovery if new COPD diagnosis or severity reassessment needed. Required for confirmed diagnosis (FEV1/FVC <0.70 post-bronchodilator). Document GOLD stage.'},
],
severe:[
{cat:'Laboratory',name:'All inpatient labs above',tag:'severe',ref:'GOLD2024',why:'Full panel for all ICU-level AECOPD.'},
{cat:'Laboratory',name:'ABG q1-2h during NIV titration or mechanical ventilation',tag:'severe',ref:'AECOPD_NIV_RAM2004',why:'Ventilator management. Target pH >7.35, avoid rapid CO2 correction in chronic hypercapnia (risk of post-hypercapnic metabolic alkalosis and cardiac arrhythmia). Permissive hypercapnia acceptable if pH normalizing.'},
{cat:'Laboratory',name:'Lactate',tag:'severe',ref:'GOLD2024',why:'If hemodynamic instability. Elevated lactate in AECOPD suggests co-existing sepsis, cardiogenic shock, or severe tissue hypoxia. Guides vasopressor and fluid decisions.'},
{cat:'Imaging',name:'Bedside POCUS / TTE',tag:'severe',ref:'GOLD2024',why:'RV function assessment (cor pulmonale, acute RV failure). IVC collapsibility for volume status. Rule out pneumothorax (absent lung sliding). Pericardial effusion. Guides fluid management in AECOPD + shock.'},
]

{topic:'Triple therapy shows mortality benefit (ETHOS + IMPACT)',guideline:'Sequential step-up from mono → dual → triple therapy',glRef:'GOLD2024',relationship:'nuance',evidence:'ETHOS (NEJM 2020, n=8588): triple therapy reduces mortality 49% vs LAMA/LABA (exploratory). IMPACT (NEJM 2018, n=10,355): triple reduces mortality 42% vs LAMA/LABA. Both reduce exacerbations 24-25% vs dual.',practical:'For Group E with eosinophils ≥300: start with triple therapy directly (ICS/LAMA/LABA). Do not require step-up through mono → dual → triple. GOLD 2024 now allows initial triple for frequent exacerbators with high eosinophils.',action:'change',studies:['ETHOS, NEJM 2020','IMPACT, NEJM 2018'],studyRefs:['ETHOS2020','IMPACT2018']},
{topic:'LAMA/LABA superior to ICS/LABA (FLAME)',guideline:'ICS/LABA was common dual therapy for COPD exacerbation prevention',glRef:'FLAME2016',relationship:'conflict',evidence:'FLAME (NEJM 2016, n=3362): LAMA/LABA (indacaterol/glycopyrronium) reduces exacerbations 11% MORE than ICS/LABA (salmeterol/fluticasone), with LESS pneumonia. Benefit when eosinophils <300.',practical:'For COPD without high eosinophils: LAMA/LABA is preferred dual therapy over ICS/LABA. Reserve ICS for eosinophils ≥300 or asthma-COPD overlap. Less pneumonia without ICS.',action:'change',studies:['FLAME, NEJM 2016'],studyRefs:['FLAME2016']},
{topic:'Home NIV for persistent hypercapnia post-AECOPD (HOT-HMV)',guideline:'Home NIV not standard after AECOPD',glRef:'NIV_COPD_2017',relationship:'nuance',evidence:'HOT-HMV (JAMA 2017, n=116): home nocturnal NIV (BiPAP) for persistent hypercapnia (PaCO2 >53 at 2-4 weeks post-AECOPD) reduces readmission/death by 50%. Median time to readmission 4.3 months vs 1.4 months.',practical:'Check ABG 2-4 weeks after AECOPD discharge. If PaCO2 >53 mmHg → prescribe home nocturnal NIV (BiPAP). This is one of the most impactful recent COPD interventions — 50% reduction in readmission/death.',action:'change',studies:['HOT-HMV, JAMA 2017'],studyRefs:['NIV_COPD_2017']},
{topic:'O2 does NOT benefit moderate desaturation (LOTT)',guideline:'Supplemental O2 prescribed for exertional desaturation and SpO2 89-93%',glRef:'LOTT2016',relationship:'conflict',evidence:'LOTT (NEJM 2016, n=738): supplemental O2 did NOT reduce death or hospitalization in COPD with moderate resting desaturation (SpO2 89-93%) or exercise-induced desaturation. No QoL improvement.',practical:'Stop prescribing ambulatory O2 for SpO2 89-93% at rest or exercise desaturation alone. LTOT only for resting SpO2 ≤88% or PaO2 ≤55 (≤59 with cor pulmonale). This change affects many home O2 prescriptions currently in place.',action:'change',studies:['LOTT, NEJM 2016'],studyRefs:['LOTT2016']},
{topic:'Eosinophil-guided ICS prescribing (GOLD 2024)',guideline:'ICS prescribed broadly in COPD regardless of eosinophils',glRef:'GOLD2024',relationship:'nuance',evidence:'FLAME, WISDOM, SUNSET: ICS benefit concentrated in eosinophilic COPD (≥300). WISDOM (NEJM 2014): ICS withdrawal safe when eos <150. ICS increases pneumonia 2-3% per year without clear benefit in non-eosinophilic COPD.',practical:'Check blood eosinophils in all COPD patients. ≥300: ICS indicated. 100-300: consider ICS if frequent exacerbations. <100: avoid ICS (pneumonia risk without benefit). Withdraw ICS in patients with recurrent pneumonia and low eosinophils.',action:'change',studies:['FLAME 2016','WISDOM 2014'],studyRefs:['FLAME2016','WISDOM2014']},

special:[
{
label:'SpO2 88-92% — the single most important number in COPD',grade:'A',ref:'GOLD2024',
content:`<strong>Excessive oxygen kills COPD patients. Target SpO2 88-92% — always.</strong> <span class="cite cite-A" onclick='openStudy("GOLD2024")'>GOLD 2024 · A</span><br><br> <strong>Why high-flow O2 is dangerous in COPD:</strong><br> 1. <strong>Haldane effect:</strong> O2 displaces CO2 from hemoglobin → PaCO2 rises<br> 2. <strong>V/Q redistribution:</strong> O2 reverses hypoxic vasoconstriction → increases dead space ventilation<br> 3. <strong>Suppressed hypoxic drive:</strong> (contributes less than 1 and 2, but real in some patients)<br><br> <strong>Austin et al. (BMJ 2010):</strong> Titrated O2 (88-92%) vs high-flow O2 in AECOPD: mortality 4% vs 9%. High-flow O2 more than DOUBLED mortality.<br><br> <strong>Practical rule:</strong><br> • Nasal cannula 1-2L/min, titrate to SpO2 88-92%<br> • NEVER set an O2 target of "94% or above" in COPD<br> • If SpO2 88% on 4L NC and patient is comfortable → that is adequate<br> • If CO2 rising despite controlled O2 → start NIV, do NOT increase O2`
},
{
label:'NIV (BiPAP) — when to start and when to intubate',grade:'A',ref:'AECOPD_NIV_RAM2004',
content:`<strong>NIV reduces mortality 46% and intubation 65% in hypercapnic AECOPD.</strong> <span class="cite cite-A" onclick='openStudy("AECOPD_NIV_RAM2004")'>Ram et al., Cochrane · A</span><br><br> <strong>START NIV when:</strong><br> • pH 7.25-7.35 + PaCO2 >45 mmHg<br> • Respiratory distress with accessory muscle use<br> • RR >25 despite initial bronchodilator treatment<br> • Start IMMEDIATELY — do not wait for formal ABG in obvious distress<br><br> <strong>Initial settings:</strong><br> • IPAP 10-14 cmH2O, EPAP 4-6 cmH2O<br> • Titrate IPAP by 2 cmH2O q15-30 min to target pH improvement<br> • Blend O2 into circuit to SpO2 88-92%<br><br> <strong>INTUBATE when:</strong><br> • pH <7.20 or deteriorating despite 1-2h NIV<br> • Respiratory arrest<br> • GCS <8 unable to protect airway<br> • Copious secretions patient cannot clear<br> • Hemodynamic instability<br><br> <strong>Post-AECOPD:</strong> Check ABG at 2-4 weeks. PaCO2 >53 → home nocturnal NIV (HOT-HMV: 50% readmission reduction) <span class="cite cite-A" onclick='openStudy("NIV_COPD_2017")'>HOT-HMV · A</span>`
},
{
label:'Eosinophil-guided ICS — when to add and when to withdraw',grade:'A',ref:'GOLD2024',
content:`<strong>Blood eosinophils are the key biomarker for ICS decisions in COPD.</strong> <span class="cite cite-A" onclick='openStudy("GOLD2024")'>GOLD 2024 · A</span><br><br> <strong>Eosinophils ≥300 cells/µL:</strong><br> • ICS indicated — add to LAMA/LABA → triple therapy<br> • Best response to ICS for exacerbation reduction<br> • Consider starting with triple therapy in Group E<br><br> <strong>Eosinophils 100-300:</strong><br> • ICS may benefit if frequent exacerbations (≥2/year)<br> • Less certain benefit than ≥300 group<br> • Trial of ICS addition → reassess at 3 months<br><br> <strong>Eosinophils <100:</strong><br> • ICS unlikely to benefit — pneumonia risk outweighs<br> • LAMA/LABA dual therapy preferred (FLAME)<br> • If currently on ICS: consider ICS withdrawal (WISDOM: safe)<br><br> <strong>ICS withdrawal indications:</strong><br> • Recurrent pneumonia while on ICS<br> • Eosinophils <100 + no exacerbations on ICS<br> • Oral candidiasis or hoarseness affecting QoL<br> • Withdraw stepwise over 12 weeks with close monitoring`
},
{
label:'COPD + HF overlap — common and undertreated',grade:'B',ref:'GOLD2024',
content:`<strong>20-30% of COPD patients have concurrent HF. Often undiagnosed.</strong><br><br> <strong>Why it matters:</strong><br> • AECOPD and ADHF have nearly identical presenting symptoms (dyspnea, edema, tachycardia)<br> • Misdiagnosis leads to wrong treatment (bronchodilators for HF, or diuretics for COPD)<br> • Combined disease has significantly worse prognosis than either alone<br><br> <strong>How to differentiate:</strong><br> • BNP/NT-proBNP: elevated in HF, normal in pure COPD<br> • Echo: check EF in all COPD patients — identifies HFrEF<br> • CXR: cardiomegaly + cephalization → HF. Hyperinflation alone → COPD<br> • Response to treatment: improved with diuretics → HF component<br><br> <strong>Beta-blockers in COPD + HFrEF:</strong><br> • Do NOT withhold beta-blockers for HFrEF in COPD — cardioselective BB (metoprolol succinate, bisoprolol) are safe<br> • Multiple studies: cardioselective BB do not worsen COPD and reduce HF mortality<br> • Carvedilol (non-selective): use with more caution but still acceptable in moderate COPD`
},
{
label:'Asthma-COPD Overlap (ACO)',grade:'B',ref:'GOLD2024',
content:`<strong>Features suggesting ACO (treat both components):</strong><br><br> • Age >40 with smoking history (COPD features)<br> • PLUS: significant bronchodilator reversibility (>400mL FEV1 increase), blood eosinophils ≥300, personal/family history of atopy/asthma, variable symptoms<br><br> <strong>Why it matters:</strong><br> • ACO patients respond better to ICS than pure COPD<br> • NEVER use LABA monotherapy in ACO (asthma component — risk of fatal bronchospasm)<br> • Higher exacerbation rate than either COPD or asthma alone<br><br> <strong>Treatment:</strong><br> • ICS is MANDATORY in ACO (regardless of eosinophil count — asthma component)<br> • ICS/LABA minimum; ICS/LAMA/LABA triple preferred<br> • Biologic therapy (anti-IL5: mepolizumab, benralizumab) may be considered if eosinophils ≥300 despite triple therapy<br> • Refer to pulmonology for confirmation and management`
},
{
label:'Smoking cessation — the ONLY treatment that slows FEV1 decline',grade:'A',ref:'COPD_SMOKING_2008',
content:`<strong>Smoking cessation reduces COPD mortality 40% — no inhaler comes close.</strong> <span class="cite cite-A" onclick='openStudy("COPD_SMOKING_2008")'>Anthonisen et al., Ann IM 2005 · A</span><br><br> <strong>Lung Health Study (14.5-year follow-up):</strong><br> • Sustained quitters: mortality 8.8% vs continued smokers 14.4%<br> • FEV1 decline normalizes to non-smoker rate within 1-2 years of quitting<br> • Benefit occurs at ANY age and ANY severity of COPD<br><br> <strong>Most effective strategy (combination):</strong><br> • Varenicline (most effective single agent) + NRT patch = highest quit rates (~35% at 1 year)<br> • Brief counseling at every visit ("5 A's": Ask, Advise, Assess, Assist, Arrange)<br> • Pharmacotherapy DOUBLES quit rates vs counseling alone<br><br> <strong>At every COPD encounter:</strong><br> • Document current smoking status<br> • Advise cessation<br> • Offer pharmacotherapy (varenicline or NRT)<br> • Refer to cessation program<br> • Follow up on quit attempt at next visit`
},
],

workup:{
outpatient:[
{cat:'Laboratory',name:'BMP (Na, K, Cr, BUN, glucose)',tag:'routine',ref:'AHA_HTN_2017',glRef:'AHA_HTN_2017',why:'Creatinine: assess for hypertensive nephropathy (AKI). Potassium: hypokalemia (aldosteronism? diuretic use?). Glucose: pheochromocytoma, Cushing. BUN: elevated with renal hypoperfusion. Baseline for medication dosing.'},
{cat:'Laboratory',name:'CBC with peripheral smear',tag:'routine',ref:'AHA_HTN_2017',glRef:'AHA_HTN_2017',why:'Schistocytes on smear = thrombotic microangiopathy (TMA) triggered by malignant HTN. Check LDH + haptoglobin if schistocytes present. Hemoglobin for anemia-related HF contribution.'},
{cat:'Laboratory',name:'Urinalysis with microscopy',tag:'routine',ref:'AHA_HTN_2017',glRef:'AHA_HTN_2017',why:'Proteinuria + hematuria + RBC casts = hypertensive nephropathy / renal end-organ damage. Active urine sediment in malignant HTN. Helps differentiate emergency (active sediment) from urgency (bland UA).'},
{cat:'Imaging',name:'ECG (12-lead)',tag:'routine',ref:'AHA_HTN_2017',glRef:'AHA_HTN_2017',why:'LVH (chronic HTN). ST changes (ACS from demand ischemia or plaque rupture). AF (common comorbidity). QTc (guides medication choice). Evaluate for acute ischemic changes in ALL hypertensive emergencies with chest pain.'},
{cat:'Imaging',name:'Chest X-ray',tag:'routine',ref:'AHA_HTN_2017',why:'Pulmonary edema (flash HF — most common hypertensive emergency). Widened mediastinum (aortic dissection). Cardiomegaly (chronic HTN with HF).'},
{cat:'Imaging',name:'Fundoscopy (dilated if possible)',tag:'routine',ref:'AHA_HTN_2017',why:'The most informative and most neglected exam in hypertensive crisis. Flame hemorrhages + cotton-wool spots = Grade III (emergency). Papilledema = Grade IV / malignant HTN (emergency regardless of BP number). Document findings explicitly.'},
{cat:'Laboratory',name:'Troponin (hs-cTnI)',tag:'selective',ref:'AHA_HTN_2017',why:'If chest pain, dyspnea, or ECG changes. Demand ischemia common with severe HTN. Elevated troponin changes management (ACS protocol, NTG infusion, avoid hydralazine).'},
{cat:'Laboratory',name:'BNP or NT-proBNP',tag:'selective',ref:'AHA_HTN_2017',why:'If dyspnea or suspected flash pulmonary edema. Markedly elevated BNP confirms acute HF. Guides IV nitroglycerin/nitroprusside use for afterload reduction.'},
],
inpatient:[
{cat:'Laboratory',name:'All outpatient labs above + LDH, haptoglobin, reticulocyte count',tag:'routine',ref:'AHA_HTN_2017',glRef:'AHA_HTN_2017',why:'TMA screening: malignant HTN can trigger MAHA (schistocytes + elevated LDH + low haptoglobin + thrombocytopenia). TMA from HTN is treated by BP control — NOT plasma exchange (distinguish from TTP).'},
{cat:'Imaging',name:'CT head non-contrast (if neurological symptoms)',tag:'routine',ref:'AHA_HTN_2017',why:'Rule out hemorrhagic stroke (ICH, SAH) vs ischemic stroke vs PRES. Management differs drastically by type. Get CT before any BP treatment in stroke — ischemic stroke requires PERMISSIVE HTN, ICH requires rapid lowering.'},

{cat:'Imaging',name:'MRI brain with DWI/FLAIR (if PRES suspected)',tag:'selective',ref:'AHA_HTN_2017',why:'PRES: posterior white matter vasogenic edema on FLAIR. Typically bilateral parieto-occipital. Reversible with BP control. May cause seizures, cortical blindness. MRI is diagnostic — CT often normal in early PRES.'},
{cat:'Laboratory',name:'Urine drug screen',tag:'selective',ref:'AHA_HTN_2017',why:'Cocaine, amphetamines, phencyclidine (PCP) cause sympathomimetic hypertensive emergencies. Cocaine: AVOID beta-blockers (unopposed alpha stimulation worsens HTN). Use benzodiazepines + NTG + phentolamine instead.'},
{cat:'Laboratory',name:'Plasma metanephrines / 24h urine catecholamines',tag:'selective',ref:'AHA_HTN_2017',why:'If pheochromocytoma suspected: paroxysmal HTN, headache, diaphoresis, palpitations, adrenal mass. Do NOT send during acute crisis (will be elevated from any sympathetic activation). Send after stabilization if clinical suspicion.'},
{cat:'Laboratory',name:'Aldosterone, renin (if resistant HTN or hypokalemia)',tag:'selective',ref:'PATHWAY2_2015',why:'Primary aldosteronism is the most common cause of secondary HTN (5-10% of all HTN, higher in resistant HTN). Aldosterone:renin ratio >30 with aldosterone >15 = positive screen. Test after stabilization, not during crisis.'},

special:[
{
label:'Emergency vs Urgency — the most important distinction',grade:'A',ref:'AHA_HTN_2017',
content:`<strong>The BP number does NOT define the emergency — end-organ damage does.</strong> <span class="cite cite-A" onclick='openStudy("AHA_HTN_2017")'>AHA/ACC 2017 · A</span><br><br> <strong>EMERGENCY (IV meds, ICU):</strong><br> BP >180/120 + ANY of: encephalopathy, acute HF, ACS, aortic dissection, hemorrhagic stroke, eclampsia, acute renal failure, TMA, papilledema<br><br> <strong>URGENCY (oral meds, outpatient follow-up):</strong><br> BP >180/120 WITHOUT any of the above. Patient may have headache, anxiety, or epistaxis — but no ACUTE organ damage.<br><br> <strong>Why this matters:</strong><br> • Emergency: rapid IV reduction in ICU saves organs/lives<br> • Urgency: aggressive IV reduction in urgency can CAUSE stroke, MI, or AKI from relative hypoperfusion<br> • Most urgency = medication non-adherence → restart meds, follow-up in 24-72h<br><br> <strong>Common error:</strong> Admitting hypertensive urgency to ICU for IV nicardipine. This wastes ICU beds and may harm the patient. Oral meds, observation 2-4h, discharge with close follow-up.`
},
{
label:'Aortic dissection — the most aggressive BP target',grade:'A',ref:'AHA_HTN_2017',
content:`<strong>SBP <120 AND HR <60 within 20 minutes. No other emergency requires this speed.</strong><br><br> <strong>Step 1: Beta-blocker FIRST (esmolol preferred)</strong><br> Esmolol 500 mcg/kg bolus → 50-200 mcg/kg/min infusion<br> Target HR <60 BEFORE adding vasodilator<br> WHY: vasodilation without HR control → reflex tachycardia → increases aortic wall shear stress → propagates dissection<br><br> <strong>Step 2: Add vasodilator if SBP still >120</strong><br> Nicardipine 5-15 mg/hr OR nitroprusside 0.25-2 mcg/kg/min<br><br> <strong>Stanford Type A (ascending):</strong> Surgical emergency → cardiac surgery stat<br> <strong>Stanford Type B (descending):</strong> Medical management (BP control) unless complicated (malperfusion, rupture)<br><br> <strong>Recognize dissection:</strong><br> • Tearing/ripping pain radiating to back<br> • BP differential >20 mmHg between arms<br> • Pulse deficit<br> • New aortic regurgitation murmur<br> • Widened mediastinum on CXR → CTA aorta STAT`
},
{
label:'Cocaine-induced hypertensive emergency',grade:'A',ref:'AHA_HTN_2017',
content:`<strong>NEVER give beta-blockers for cocaine-induced HTN.</strong> <span class="cite cite-A" onclick='openStudy("AHA_HTN_2017")'>AHA/ACC 2017 · A</span><br><br> <strong>Why beta-blockers are dangerous:</strong><br> Cocaine blocks norepinephrine reuptake → alpha + beta stimulation. Beta-blockade leaves UNOPPOSED ALPHA stimulation → paradoxical worsening of HTN + coronary vasospasm → MI, stroke<br><br> <strong>Treatment protocol:</strong><br> 1. <strong>Benzodiazepines FIRST:</strong> Diazepam 5-10mg IV q5 min or midazolam 2-5mg IV — reduces sympathetic drive, anxiety, and BP<br> 2. <strong>NTG infusion:</strong> 5-100 mcg/min — coronary vasodilation + BP reduction<br> 3. <strong>Phentolamine:</strong> 5-10mg IV q10 min — alpha-blocker, directly counteracts cocaine's alpha-stimulation<br> 4. <strong>Nicardipine:</strong> if above insufficient — safe vasodilator<br><br> <strong>If ACS + cocaine:</strong> benzodiazepines + NTG + aspirin + heparin. NO beta-blockers. Catheterization if STEMI. Labetalol is sometimes used controversially (mixed alpha/beta) but pure beta-blockers (metoprolol, esmolol) are contraindicated.`
},
{
label:'Eclampsia — OB emergency protocol',grade:'A',ref:'AHA_HTN_2017',
content:`<strong>Eclampsia = seizures + HTN + proteinuria in pregnancy >20 weeks.</strong><br><br> <strong>Immediate management:</strong><br> 1. <strong>MgSO₄:</strong> 4-6g IV bolus over 20 min → 1-2g/hr infusion. BOTH treatment for seizures AND prophylaxis against recurrence. MgSO₄ is superior to phenytoin and diazepam for eclamptic seizures (Magpie trial).<br> 2. <strong>IV labetalol:</strong> 20mg → 40mg → 80mg escalating boluses q10 min. OR IV hydralazine 5-10mg q20 min. Target SBP <160, DBP <110.<br> 3. <strong>Delivery:</strong> Definitive treatment. Timing depends on gestational age and severity. Severe features → deliver regardless of GA after maternal stabilization.<br><br> <strong>Do NOT use in pregnancy:</strong><br> • ACEi/ARB (fetotoxic — renal agenesis)<br> • Nitroprusside (fetal cyanide toxicity)<br> • Atenolol (fetal growth restriction)<br><br> <strong>Safe in pregnancy:</strong> Labetalol, hydralazine, nifedipine (oral), methyldopa, MgSO₄`
},
{
label:'Secondary HTN — when to suspect and test',grade:'A',ref:'AHA_HTN_2017',
content:`<strong>Consider secondary HTN in: resistant HTN, young onset (<30), or sudden worsening.</strong> <span class="cite cite-A" onclick='openStudy("AHA_HTN_2017")'>AHA/ACC 2017 · A</span><br><br> <strong>Primary aldosteronism (5-10% of all HTN):</strong><br> • Hypokalemia + resistant HTN. Aldosterone:renin ratio >30 with aldo >15 = positive screen<br> • MOST COMMON secondary cause — screen in all resistant HTN<br><br> <strong>Renal artery stenosis:</strong><br> • Abrupt onset after age 55 (atherosclerotic) or young woman (fibromuscular dysplasia)<br> • Cr rise >30% after ACEi/ARB initiation. Renal artery duplex or CTA/MRA<br><br> <strong>Pheochromocytoma:</strong><br> • Paroxysmal HTN + headache + palpitations + diaphoresis (classic triad)<br> • Plasma free metanephrines (most sensitive test). CT adrenals<br><br> <strong>OSA:</strong><br> • Resistant HTN + daytime somnolence + obesity + nocturia + snoring<br> • Most common reversible cause of resistant HTN. CPAP reduces BP 2-5 mmHg<br><br> <strong>Other:</strong> Cushing (moon face, striae, central obesity), coarctation (BP differential arms/legs, young patient), thyroid disease (hyper or hypo)`
},
{
label:'DASH diet — as effective as one antihypertensive drug',grade:'A',ref:'DASH1997',
content:`<strong>DASH diet reduces BP 5.5/3.0 mmHg overall, 11.4/5.5 in hypertensives — equivalent to monotherapy.</strong> <span class="cite cite-A" onclick='openStudy("DASH1997")'>DASH, NEJM 1997 · A</span><br><br> <strong>DASH diet:</strong><br> • 4-5 servings fruits/day, 4-5 servings vegetables/day<br> • Low-fat dairy (2-3 servings/day)<br> • Whole grains, poultry, fish, nuts<br> • Reduce saturated fat, red meat, sweets<br><br> <strong>Combined with sodium restriction (<1.5g/day):</strong><br> • SBP reduced 11.5 mmHg — almost equivalent to 2 antihypertensive drugs<br><br> <strong>Other lifestyle interventions for BP:</strong><br> • Weight loss: each 1 kg lost = 1 mmHg SBP reduction<br> • Exercise: 150 min/week moderate = 5-8 mmHg reduction<br> • Alcohol reduction: ≤1 drink/day men, 0 women = 4 mmHg reduction<br> • Potassium supplementation: 3.5-5g/day = 4-5 mmHg reduction<br><br> <strong>Prescribe lifestyle BEFORE medications for Stage 1 HTN (130-139/80-89) without CVD risk.</strong>`

followup:[
{txt:'After hypertensive URGENCY: follow-up within 24-72h. Medication reconciliation, assess adherence, check BMP for electrolytes and renal function.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'After hypertensive EMERGENCY: transition to oral agents when BP stable on IV for 12-24h. Overlap oral + IV for 2-4h before stopping IV.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'Home BP monitoring — validated device, proper technique (correct cuff size, seated, back supported, arm at heart level). Record and bring to visits.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'BMP at 2-4 weeks after starting or changing ACEi/ARB or spironolactone — K⁺ and Cr monitoring mandatory.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'Target BP <130/80 for most adults (SPRINT). Individualize in elderly/frail — avoid overtreatment that causes falls, syncope, or AKI.',ref:'SPRINT2015_HTN',grade:'A'},
{txt:'Screen for secondary HTN if: resistant HTN (3+ drugs), onset <30 years, sudden worsening of previously controlled HTN, hypokalemia without diuretic.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'Medication adherence assessment at every visit — non-adherence is the most common cause of hypertensive urgency and apparent resistant HTN.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'DASH diet counseling + sodium restriction (<2.3g/day, ideally <1.5g) + exercise prescription (150 min/week) + alcohol limitation + weight management.',ref:'DASH1997',grade:'A'},
{txt:'Ambulatory BP monitoring (ABPM) or home BP series for white coat HTN vs masked HTN — before adding medications for elevated office BP.',ref:'AHA_HTN_2017',grade:'A'},
{txt:'Return precautions: severe headache, chest pain, shortness of breath, visual changes, confusion, weakness/numbness on one side, seizures → ED immediately.',ref:'AHA_HTN_2017',grade:'A'},

lifestyle:[
{
category:'Diet & Sodium',
icon:'🥗',
items:[
{intervention:'DASH diet',evidence:'DASH (NEJM 1997, n=459): reduces SBP 5.5/3.0 mmHg overall, 11.4/5.5 in hypertensives. Combined with sodium restriction (<1.5g/day): SBP reduced 11.5 mmHg — equivalent to 1-2 antihypertensive drugs. AHA Class I recommendation for all HTN.',strength:'high',direction:'benefit',studyRef:'DASH1997',refNote:'DASH, NEJM 1997 + DASH-Sodium, NEJM 2001',action:'Prescribe DASH diet for all hypertensive patients: 4-5 servings fruits, 4-5 vegetables, 2-3 low-fat dairy, whole grains, fish, poultry, nuts daily. Reduce saturated fat, red meat, sweets. Sodium <2.3g/day (ideally <1.5g). Provide written diet plan or referral to dietitian.'},
{intervention:'Sodium restriction (<2.3g/day)',evidence:'DASH-Sodium: each 1.2g/day sodium reduction lowers SBP ~4 mmHg. Additive to DASH diet. Average US intake is 3.4g/day. Reducing to <2.3g achieves 2-8 mmHg SBP reduction. <1.5g for optimal benefit.',strength:'high',direction:'benefit',studyRef:'AHA_HTN_2017',refNote:'AHA 2017 + DASH-Sodium, NEJM 2001',action:'Counsel on sodium restriction at every HTN visit. Read nutrition labels (target <600mg/meal). Avoid processed foods, canned soups, fast food. Cook at home. Use herbs/spices instead of salt. A simple change: stop adding salt at the table.'},
]
},
{
category:'Exercise & Weight',
icon:'🏃',
items:[
{intervention:'Aerobic exercise (150 min/week moderate or 75 min/week vigorous)',evidence:'Regular aerobic exercise reduces SBP 5-8 mmHg in hypertensive adults. Effect occurs within 2-4 weeks and persists with continued exercise. Resistance training adds 2-3 mmHg reduction. Both aerobic + resistance recommended.',strength:'high',direction:'benefit',studyRef:'AHA_HTN_2017',refNote:'AHA 2017 + Cornelissen VA, JACC 2013',action:'Prescribe exercise: 150 min/week moderate aerobic (brisk walking, cycling, swimming) or 75 min/week vigorous. Add resistance training 2x/week. Start at current fitness level. Walking 10,000 steps/day is a reasonable surrogate target.'},
{intervention:'Weight loss (5-10% body weight in overweight/obese)',evidence:'Each 1 kg body weight lost reduces SBP ~1 mmHg. In overweight HTN (BMI >25): 5-10% weight loss reduces SBP 5-10 mmHg. GLP-1 agonists (semaglutide) provide 10-15% weight loss + additional cardiometabolic benefit.',strength:'high',direction:'benefit',studyRef:'AHA_HTN_2017',refNote:'AHA 2017 + SELECT Trial (semaglutide CV benefit)',action:'For BMI >25 with HTN: structured weight loss program targeting 5-10% body weight over 6 months. Caloric restriction + exercise + behavioral support. Consider GLP-1 agonist if BMI >27 + CV risk (SELECT trial). Document weight at every HTN visit.'},
]
},
{
category:'Substance Modification',
icon:'🍷',
items:[
{intervention:'Alcohol limitation (≤1 drink/day men, 0 women)',evidence:'Reducing alcohol from >2 drinks/day to ≤1 drink/day reduces SBP ~4 mmHg. Heavy alcohol (>3 drinks/day) raises SBP 5-10 mmHg. Binge drinking triggers acute hypertensive episodes.',strength:'high',direction:'benefit',studyRef:'AHA_HTN_2017',refNote:'AHA 2017 HTN Guideline — Lifestyle Modifications',action:'AUDIT-C screening at every HTN visit. Men: ≤2 drinks/day (prefer ≤1). Women: ≤1 drink/day. Heavy drinkers: target 50% reduction initially. No safe level established for HTN prevention.'},
{intervention:'Smoking cessation',evidence:'Smoking acutely raises BP 5-10 mmHg per cigarette via sympathetic activation. Chronic smoking increases arterial stiffness and CVD risk independent of BP. Cessation reduces CVD risk within 1-5 years even if BP unchanged.',strength:'high',direction:'benefit',studyRef:'AHA_HTN_2017',refNote:'AHA 2017 — Smoking and Cardiovascular Risk',action:'Offer cessation at every visit. Varenicline or NRT. Smoking cessation reduces CVD risk even if BP does not change — the vascular benefit is independent. Combine with BP medications for maximum CVD reduction.'},
]
},
