<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxRef — Clinical Reference Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2ED;--sur:#FFFFFF;--sur2:#EDEAE3;--bdr:#E0DBD2;--bdr2:#CECA C0;
  --tx:#18140F;--txm:#6A6258;--txs:#9C9488;
  --acc:#1B3A5C;--acc-l:#EAF0F7;--acc-m:#5A8DB5;
  --grn:#0A4828;--grn-l:#EAF7F0;--grn-b:#27976A;
  --red:#5A0A0A;--red-l:#FFF0F0;--red-b:#D63C3C;
  --amb:#5A3800;--amb-l:#FFF7EB;--amb-b:#D48609;
  --delta:#7B3900;--delta-l:#FFF3EA;--delta-b:#E87F56;
  --fn:'Syne',sans-serif;--serif:'Instrument Serif',serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;line-height:1.5}

/* ─── SHELL ─────────────────────────────── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:50px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;cursor:pointer}
.logo-mark{width:22px;height:22px;background:var(--acc);border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:12px;height:12px;fill:#fff}
.bc{font-size:12px;color:var(--txm);display:flex;align-items:center;gap:5px;cursor:pointer}
.bc:hover{color:var(--acc)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.tbtn{padding:5px 11px;border:1px solid var(--bdr);border-radius:5px;background:var(--sur);color:var(--txm);font-size:12px;font-family:var(--fn);cursor:pointer;font-weight:500;transition:all .12s}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.tbtn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.tbtn.pri:hover{opacity:.88}
.tbtn.has{background:var(--grn-l);border-color:var(--grn-b);color:var(--grn)}
.main-row{display:flex;flex:1;overflow:hidden}

/* ─── LEFT NAV ───────────────────────────── */
.lnav{width:210px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.lnav::-webkit-scrollbar{width:3px}
.lnav::-webkit-scrollbar-thumb{background:var(--bdr)}
.lnav-hd{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.lnav-lbl{font-size:10px;font-weight:700;color:var(--txs);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px}
.nav-step{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:all .12s}
.nav-step:hover{background:var(--sur2)}
.nav-step.active{background:var(--acc-l)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--sur2);border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txm);flex-shrink:0;font-family:var(--mono)}
.nav-step.active .step-num{background:var(--acc);border-color:var(--acc);color:#fff}
.step-lbl{font-size:12px;font-weight:500;color:var(--txm);line-height:1.3}
.nav-step.active .step-lbl{color:var(--acc);font-weight:600}
.pt-zone{padding:12px 14px;border-top:1px solid var(--bdr);margin-top:auto}
.pt-empty-lbl{font-size:11px;color:var(--txs);line-height:1.5;margin-bottom:8px}
.pt-add-btn{width:100%;padding:7px;background:var(--acc);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fn)}
.pt-filled{font-size:11px}
.pt-r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--sur2)}
.pt-r:last-child{border-bottom:none}
.pt-l{color:var(--txs)}
.pt-v{font-weight:600;color:var(--tx);font-family:var(--mono);font-size:11px}
.pt-match{margin-top:8px;padding:8px 10px;background:var(--acc-l);border-radius:5px;border:1px solid #C3D5E8}
.pt-mt{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.pt-mi{font-size:11px;color:var(--acc);padding:2px 0;display:flex;gap:5px}
.pt-mi::before{content:'→';flex-shrink:0}
.pt-edit{font-size:11px;color:var(--acc);cursor:pointer;display:inline-block;margin-top:6px}

/* ─── CONTENT AREA ───────────────────────── */
.content{flex:1;overflow-y:auto;padding:0}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ─── DISEASE HEADER ─────────────────────── */
.d-hdr{padding:20px 28px 0;background:var(--sur);border-bottom:2px solid var(--tx);margin-bottom:0}
.d-title{font-family:var(--serif);font-size:28px;letter-spacing:-.5px;margin-bottom:4px}
.d-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:12px;font-size:11px;color:var(--txm)}
.d-sep{width:3px;height:3px;background:var(--bdr2);border-radius:50%}
.ev-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--delta-l);color:var(--delta);border:1px solid var(--delta-b)}

/* ─── STEP SECTIONS ──────────────────────── */
.step-section{padding:24px 28px;border-bottom:1px solid var(--bdr)}
.step-section:last-child{border-bottom:none}
.step-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.step-n{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--txs);background:var(--sur2);border:1px solid var(--bdr);padding:3px 7px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.step-title{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--tx)}
.step-sub{font-size:12px;color:var(--txm);margin-left:auto;font-style:italic}
.sline{flex:1;height:1px;background:var(--bdr);margin-left:6px}

/* ─── SYMPTOMS ───────────────────────────── */
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sym-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px}
.sym-name{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--tx)}
.sym-cat{font-size:10px;color:var(--txs);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.sym-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px}
.stat-row{font-size:11px}
.stat-lbl{color:var(--txm);margin-bottom:2px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.stat-bar-wrap{background:var(--sur2);border-radius:3px;height:6px;overflow:hidden;margin-bottom:1px}
.stat-bar{height:100%;border-radius:3px;transition:width .4s ease}
.bar-hi{background:var(--grn-b)}
.bar-md{background:var(--amb-b)}
.bar-lo{background:var(--red-b)}
.bar-na{background:var(--bdr2)}
.stat-val{font-size:10px;font-family:var(--mono);font-weight:500}
.val-hi{color:var(--grn)}
.val-md{color:var(--amb)}
.val-lo{color:var(--red)}
.val-na{color:var(--txs)}
.sym-note{font-size:11px;color:var(--txm);line-height:1.4;border-top:1px solid var(--sur2);padding-top:6px;margin-top:2px}

/* ─── RISK / SCORES ──────────────────────── */
.risk-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.criteria-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.criteria-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.criteria-name{font-size:13px;font-weight:700}
.criteria-src{font-size:11px;color:var(--txm);margin-top:1px}
.criteria-bd{padding:12px 14px}
.crit-grp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;margin-top:8px}
.crit-grp-lbl:first-child{margin-top:0}
.crit-grp-lbl.red{color:var(--red)}
.crit-grp-lbl.amb{color:var(--amb)}
.crit-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--sur2);font-size:12px;color:var(--tx)}
.crit-item:last-child{border-bottom:none}
.crit-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.crit-dot.red{background:var(--red-b)}
.crit-dot.amb{background:var(--amb-b)}
.crit-trigger{margin-top:8px;padding:7px 10px;background:var(--red-l);border-radius:5px;border:1px solid var(--red-b);font-size:11px;color:var(--red);font-weight:600;line-height:1.4}
.crit-dx{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--sur2)}
.crit-dx:last-child{border-bottom:none}
.crit-dx-cb{accent-color:var(--acc);margin-top:2px;cursor:pointer}
.crit-dx-lbl{font-size:12px;line-height:1.5;cursor:pointer}
.crit-dx-sub{font-size:11px;color:var(--txm)}
.req-tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8;margin-left:5px;vertical-align:middle}
.dx-result{margin-top:10px;padding:8px 11px;border-radius:6px;font-size:12px;font-weight:600;display:none}
.dx-result.show{display:block}
.dx-result.met{background:var(--grn-l);border:1px solid var(--grn-b);color:var(--grn)}
.dx-result.partial{background:var(--amb-l);border:1px solid var(--amb-b);color:var(--amb)}
.dx-result.notmet{background:var(--red-l);border:1px solid var(--red-b);color:var(--red)}
.dx-note{font-size:11px;color:var(--txm);padding:7px 9px;background:var(--sur2);border-radius:5px;border:1px solid var(--bdr);margin-top:7px;line-height:1.5}
.score-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.score-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between}
.score-name{font-size:13px;font-weight:700}
.score-desc{font-size:11px;color:var(--txm);margin-top:1px}
.score-body{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.score-var{margin-bottom:8px}
.score-var-lbl{font-size:11px;color:var(--txm);margin-bottom:3px}
.score-sel{width:100%;padding:5px 8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--tx);font-size:12px;font-family:var(--fn);outline:none;cursor:pointer}
.score-sel:focus{border-color:var(--acc)}
.score-result{padding:10px 12px;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr)}
.score-big{font-size:32px;font-weight:700;font-family:var(--mono);color:var(--acc);line-height:1;margin-bottom:6px}
.score-row{padding:5px 8px;border-radius:4px;font-size:11px;margin-bottom:2px;border:1px solid transparent;opacity:.35;line-height:1.4}
.score-row.active{opacity:1;font-weight:600}
.s-lo{background:var(--grn-l);border-color:var(--grn-b);color:var(--grn)}
.s-md{background:var(--amb-l);border-color:var(--amb-b);color:var(--amb)}
.s-hi{background:var(--red-l);border-color:var(--red-b);color:var(--red)}

/* ─── WORKUP ─────────────────────────────── */
.wk-tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:14px;gap:0}
.wk-tab{padding:7px 14px;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.wk-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.wk-tab:hover:not(.active){color:var(--tx)}
.wk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--sur2)}
.wk-row:last-child{border-bottom:none}
.wk-cb{accent-color:var(--acc);margin-top:3px;flex-shrink:0;cursor:pointer}
.wk-body{flex:1}
.wk-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.wk-why{font-size:11px;color:var(--txm);line-height:1.4}
.wk-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.wt-routine{background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8}
.wt-selective{background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b)}
.wt-severe{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.wk-stats{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.wk-stat{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;background:var(--sur2);border:1px solid var(--bdr);color:var(--txm)}
.wk-stat span{color:var(--tx);font-weight:600}

/* ─── TREATMENT TABS ─────────────────────── */
.tx-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tx-tab{padding:6px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;font-family:var(--fn)}
.tx-tab.active{background:var(--acc);border-color:var(--acc);color:#fff}
.tx-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;margin-bottom:12px;overflow:hidden}
.tx-hd{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.tx-name{font-size:14px;font-weight:700}
.tx-class{font-size:11px;color:var(--txm);margin-top:1px}
.tx-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.ttag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;border:1px solid}
.ttag-1l{background:var(--acc-l);color:var(--acc);border-color:#C3D5E8}
.ttag-pref{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.ttag-alt{background:var(--sur2);color:var(--txm);border-color:var(--bdr)}
.tx-bd{padding:14px}
.dose-tbl{width:100%;border-collapse:collapse;margin-bottom:10px}
.dose-tbl td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--sur2);vertical-align:top}
.dose-tbl tr:last-child td{border-bottom:none}
.dose-lbl{color:var(--txm);width:30%;font-size:11px;padding-top:8px}
.dose-val{color:var(--acc);font-family:var(--mono);font-size:12px;font-weight:500}
.dose-note{font-size:11px;color:var(--txm);font-family:var(--fn);margin-top:2px}
.pk-strip{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--txm);background:var(--sur2);padding:7px 10px;border-radius:5px;margin-bottom:10px;border:1px solid var(--bdr)}
.pk-item strong{color:var(--tx)}
.tx-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tx-col{background:var(--sur2);border-radius:6px;padding:9px 11px;border:1px solid var(--bdr)}
.tx-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.tx-col-title.red{color:var(--red)}
.tx-col-title.amb{color:var(--amb)}
.tx-col-title.blue{color:var(--acc)}
.tx-col-title.grn{color:var(--grn)}
.tx-li{font-size:11px;color:#5A5450;padding:3px 0;border-bottom:1px solid var(--bdr);line-height:1.4}
.tx-li:last-child{border-bottom:none}
.tx-li::before{content:'– ';color:var(--bdr2)}
.ev-section{border-top:1px solid var(--bdr);padding-top:10px;margin-top:8px}
.ev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txs);margin-bottom:6px}
.ev-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--sur2);flex-wrap:wrap}
.ev-row:last-child{border-bottom:none}
.ev-trial-btn{font-size:11px;font-weight:600;padding:3px 8px;background:var(--acc-l);border:1px solid #C3D5E8;border-radius:4px;color:var(--acc);cursor:pointer;font-family:var(--fn);flex-shrink:0}
.ev-trial-btn:hover{background:#DDE8F2}
.ev-grade{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;font-family:var(--mono);flex-shrink:0}
.ev-A{background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b)}
.ev-B{background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b)}
.ev-C{background:var(--sur2);color:var(--txm);border:1px solid var(--bdr)}
.ev-key{font-size:11px;color:var(--tx);background:var(--acc-l);padding:3px 8px;border-radius:3px;margin-top:2px;width:100%;line-height:1.4;border:1px solid #C3D5E8}
.apply-yes{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--grn-l);color:var(--grn);border:1px solid var(--grn-b);flex-shrink:0}
.apply-no{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--sur2);color:var(--txs);border:1px solid var(--bdr);flex-shrink:0}
.apply-unk{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-b);flex-shrink:0}

/* ─── DELTA VIEW (under treatment) ──────── */
.delta-block{background:var(--delta-l);border:1px solid var(--delta-b);border-radius:8px;margin-top:18px;overflow:hidden}
.delta-hd{padding:11px 14px;border-bottom:1px solid var(--delta-b);display:flex;align-items:center;gap:8px}
.delta-hd-title{font-size:13px;font-weight:700;color:var(--delta)}
.delta-pill-new{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--delta);color:#fff;letter-spacing:.3px}
.delta-intro{font-size:12px;color:var(--delta);padding:10px 14px 6px;line-height:1.5;border-bottom:1px solid rgba(232,127,86,.25)}
.delta-row{padding:11px 14px;border-bottom:1px solid rgba(232,127,86,.2);display:grid;grid-template-columns:140px 1fr 1fr 1fr 110px;gap:10px;align-items:start;font-size:12px}
.delta-row:last-child{border-bottom:none}
.delta-row-hd{padding:7px 14px;display:grid;grid-template-columns:140px 1fr 1fr 1fr 110px;gap:10px;background:rgba(232,127,86,.12);border-bottom:1px solid rgba(232,127,86,.2)}
.delta-row-hd span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--delta)}
.delta-topic{font-weight:600;color:var(--tx)}
.delta-gl{color:var(--txm)}
.rel-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid;margin-bottom:3px}
.rp-sup{background:var(--grn-l);color:var(--grn);border-color:var(--grn-b)}
.rp-conf{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.rp-nuance{background:#FAFAEB;color:#3A3A0A;border-color:#C4B800}
.rp-early{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.act-tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-top:3px;background:var(--acc-l);color:var(--acc);border:1px solid #C3D5E8}
.act-tag.chg{background:var(--delta-l);color:var(--delta);border-color:var(--delta-b)}
.act-tag.hold{background:var(--amb-l);color:var(--amb);border-color:var(--amb-b)}
.delta-study-btn{font-size:10px;padding:2px 6px;background:rgba(255,255,255,.7);border:1px solid rgba(232,127,86,.4);border-radius:3px;color:var(--delta);cursor:pointer;font-family:var(--fn);font-weight:500;margin-right:3px;margin-bottom:3px}
.delta-study-btn:hover{background:#fff}

/* ─── SPECIAL SITUATIONS ─────────────────── */
.acc-item{border:1px solid var(--bdr);border-radius:7px;margin-bottom:6px;overflow:hidden;background:var(--sur)}
.acc-trigger{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;justify-content:space-between;user-select:none}
.acc-trigger:hover{background:var(--sur2)}
.acc-arrow{font-size:10px;color:var(--txm);transition:transform .2s}
.acc-item.open .acc-arrow{transform:rotate(90deg)}
.acc-body{display:none;padding:12px 14px;border-top:1px solid var(--bdr);font-size:12px;line-height:1.7;color:#4A4540}
.acc-item.open .acc-body{display:block}

function statBar(val,lbl){
  if(val===null||val===undefined) return `<div class="stat-row"><div class="stat-lbl">${lbl}</div><div class="stat-bar-wrap"><div class="stat-bar bar-na" style="width:0%"></div></div><div class="stat-val val-na">—</div></div>`;
  const n=parseFloat(val);
  const cls=n>=75?'bar-hi':n>=50?'bar-md':'bar-lo';
  const vcls=n>=75?'val-hi':n>=50?'val-md':'val-lo';
  return `<div class="stat-row"><div class="stat-lbl">${lbl}</div><div class="stat-bar-wrap"><div class="stat-bar ${cls}" style="width:${n}%"></div></div><div class="stat-val ${vcls}">${n}%</div></div>`;
}
function gradeB(g){
  return `<span class="ev-grade ev-${g||'C'}">Grade ${g||'?'}</span>`;
}
function relPill(r){
  const m={supports:['rp-sup','Supports'],conflict:['rp-conf','May conflict'],nuance:['rp-nuance','Adds nuance'],early:['rp-early','Early signal']};
  const[c,l]=m[r]||['rp-nuance','Δ'];
  return `<div class="rel-pill ${c}">${l}</div>`;
}
function actionTag(a){
  const m={'no-change':'No action change','reinforces':'Reinforces care','consider':'Consider in select pts','change':'⚡ Consider adopting'};
  const cls=a==='change'?'chg':a==='consider'?'hold':'';
  return `<span class="act-tag ${cls}">${m[a]||a}</span>`;
}
function patientApply(trial){
  if(!S.patient) return 'unk';
  const sd=CAP_DATA.studies[trial];
  if(!sd) return 'unk';
  const e=(sd.exclusion||'').toLowerCase();
  const p=S.patient;
  if(p.immunocomp&&(e.includes('immunocomp')||e.includes('immunosuppres'))) return 'no';
  if((p.comorbidities||[]).includes('sot')&&e.includes('transplant')) return 'no';
  if(p.age&&sd.inclusion&&sd.inclusion.includes('≥18')&&p.age<18) return 'no';
  return 'yes';
}
function applyBadge(trial){
  const r=patientApply(trial);
  if(r==='yes') return `<span class="apply-yes">✓ Applies</span>`;
  if(r==='no') return `<span class="apply-no">✗ Excluded</span>`;
  return `<span class="apply-unk">? Add patient</span>`;
}

          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────────────────────
function renderModal(){
  if(!S.modal) return '';
  if(S.modal==='patient') return renderPtModal();
  if(S.modal.type==='study') return renderStudyModal(S.modal.key);
  return '';
}

function renderPtModal(){
  const p=S.patient||{};
  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-hd"><div class="modal-title">Patient Profile</div><button class="modal-x" onclick="closeModal()">×</button></div>
      <div class="modal-bd">

          <div class="form-r"><label class="form-lbl">CrCl (mL/min)</label><input class="form-inp" type="number" id="pt-crcl" value="${p.crcl||''}" placeholder="optional"></div>
          <div class="form-r"><label class="form-lbl">Setting</label><select class="form-sel" id="pt-setting">
            <option ${(p.setting||'')==='Outpatient'?'selected':''}>Outpatient</option>
            <option ${(p.setting||'')==='Inpatient Non-Severe'?'selected':''}>Inpatient Non-Severe</option>
            <option ${(p.setting||'')==='ICU / Severe'?'selected':''}>ICU / Severe</option>
          </select></div>
        </div>
        <div class="form-r"><label class="form-lbl">O₂ requirement</label><select class="form-sel" id="pt-o2">
          <option value="">Room air / low-flow NC</option>
          <option value="high-flow" ${p.o2==='high-flow'?'selected':''}>High-flow O₂ (>6L/min)</option>
          <option value="HFNC or MV" ${p.o2==='HFNC or MV'?'selected':''}>HFNC or mechanical ventilation</option>
        </select></div>
        <div class="form-r"><label class="form-lbl">Key factors</label>
          <div class="cmb-grid">
            ${[['immunocomp','Immunocompromised'],['pcn_allergy','PCN allergy'],['qtc','QTc >500ms'],['ckd','CKD'],['structural_lung','Structural lung dz'],['prior_mrsa','Prior MRSA'],['pregnant','Pregnant'],['sot','SOT recipient']].map(([k,l])=>`<label class="cmb-item"><input type="checkbox" id="pt-${k}" ${p[k]?'checked':''}> ${l}</label>`).join('')}
          </div>
        </div>
        <button class="save-btn" onclick="savePatient()">Save & Apply</button>
        ${S.patient?`<button onclick="S.patient=null;closeModal()" style="width:100%;margin-top:6px;padding:7px;background:transparent;border:1px solid var(--bdr);border-radius:5px;color:var(--txm);cursor:pointer;font-family:var(--fn);font-size:13px">Clear Patient</button>`:''}

          <div class="m-r"><div class="m-l">Result</div><div class="m-v" style="font-weight:600;color:var(--tx)">${sd.result||'See publication'}</div></div>

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
function openDisease(id){S.view='disease';S.txTab='inpatient';S.wkTab='inpatient';S.accordions={};R();}
function openPtModal(){S.modal='patient';R();}
function closeModal(){S.modal=null;R();}
function openStudy(key){S.modal={type:'study',key};R();}
function scrollToStep(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});}

function updateScore(id){
  const sc=CAP_DATA.scores[id];
  let total=0;
  sc.vars.forEach(v=>{const el=document.getElementById(`${id}-${v.id}`);if(el)total+=parseInt(el.value)||0;});
  const el=document.getElementById(`${id}-total`);
  if(el)el.textContent=total;
  sc.interp.forEach((i,idx)=>{
    const row=document.getElementById(`${id}-r-${idx}`);
    if(!row)return;
    const match=total>=i.range[0]&&total<=i.range[1];
    row.className=`score-row s-${i.color}${match?' active':''}`;
  });
}

function updateDx(dxId){
  const dx=CAP_DATA.diagnosticCriteria.find(d=>d.id===dxId);
  const cbs=document.querySelectorAll(`[data-dx="${dxId}"]`);
  const checked=[...cbs].filter(cb=>cb.checked).length;
  const majorChecked=[...cbs].filter(cb=>cb.checked&&cb.id.endsWith('-mv')||cb.id.endsWith('-sepshk')).length;
  const minorChecked=checked-majorChecked;
  let status='',msg='';
  if(majorChecked>=1){status='met';msg='✓ Meets SEVERE CAP criteria (major criterion) — ICU admission indicated';}
  else if(minorChecked>=3){status='met';msg=`✓ Meets SEVERE CAP criteria (${minorChecked} minor criteria ≥3 threshold) — ICU admission indicated`;}
  else if(checked>0){status='partial';msg=`${minorChecked}/3 minor criteria — ${3-minorChecked} more needed for ICU threshold (or 1 major)`;}
  else{status='notmet';msg='No criteria checked — check applicable findings above';}
  const el=document.getElementById(`dx-result-${dxId}`);
  if(el){el.className=`dx-result show ${status}`;el.textContent=msg;}
}

function savePatient(){
  const age=parseInt(document.getElementById('pt-age').value)||null;
  const sex=document.getElementById('pt-sex').value;
  const crcl=parseFloat(document.getElementById('pt-crcl').value)||null;
  const setting=document.getElementById('pt-setting').value;
  const o2=document.getElementById('pt-o2').value;
  const flags=['immunocomp','pcn_allergy','qtc','ckd','structural_lung','prior_mrsa','pregnant','sot'];
  const obj={age,sex,crcl,setting,o2,comorbidities:[]};
  flags.forEach(f=>{if(document.getElementById('pt-'+f)?.checked){obj[f]=true;obj.comorbidities.push(f);}});
  S.patient=obj;
  if(setting==='ICU / Severe'||o2==='HFNC or MV'){S.txTab='severe';S.wkTab='severe';}
  else if(setting==='Outpatient'){S.txTab='outpatient';S.wkTab='outpatient';}
  closeModal();
}

R();
loadEvidence();
</script>
